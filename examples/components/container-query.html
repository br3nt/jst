<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Container queries · JST components</title>
<link rel="stylesheet" href="../../jst-layout.css">
<link rel="stylesheet" href="../../jst-components.css">
<style>
  body { margin: var(--jst-space-l); }
</style>
</head>
<body data-theme="jst">
<script>
  (function () {
    const ok = (t) => typeof t === 'string' && /^[a-z][a-z0-9]*$/.test(t);
    const p = new URLSearchParams(location.search).get('theme');
    if (ok(p)) document.body.dataset.theme = p;
    addEventListener('message', (e) => {
      const d = e.data;
      if (d && d.type === 'jst-theme' && ok(d.theme)) document.body.dataset.theme = d.theme;
    });
  })();
</script>
<!-- example:start -->
<style>
  /* The stats respond to the CONTAINER's width, not the viewport's. */
  .cq-stats { display: flex; gap: var(--jst-space-l); }
  @container (width < 24rem) {
    .cq-stats { flex-direction: column; gap: var(--jst-space-xs); }
  }
</style>
<div data-container style="resize: horizontal; overflow: auto; border: var(--jst-border-width) dashed var(--jst-border); border-radius: var(--jst-radius); padding: var(--jst-space-s); min-inline-size: 14rem; max-inline-size: 100%">
  <div class="cq-stats">
    <div class="jst-stat"><span class="jst-eyebrow">Income</span><span class="jst-stat-value">$8,120</span></div>
    <div class="jst-stat" data-trend="down"><span class="jst-eyebrow">Spent</span><span class="jst-stat-value">$5,867</span></div>
    <div class="jst-stat" data-trend="up"><span class="jst-eyebrow">Remaining</span><span class="jst-stat-value">$2,253</span></div>
  </div>
</div>
<!-- example:end -->
</body>
</html>
