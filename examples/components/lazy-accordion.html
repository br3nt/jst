<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lazy accordion · JST components</title>
<link rel="stylesheet" href="../../jst-layout.css">
<link rel="stylesheet" href="../../jst-components.css">
<script type="module" src="../../jst.js"></script>
<script type="module" src="../../jst-behaviors.js"></script>
<style>
  body { margin: var(--jst-space-l); }
</style>
</head>
<body data-theme="jst">
<script>
  (function () {
    const ok = (t) => typeof t === 'string' && /^[a-z][a-z0-9]*$/.test(t);
    const p = new URLSearchParams(location.search).get('theme');
    if (ok(p)) document.body.dataset.theme = p;
    addEventListener('message', (e) => {
      const d = e.data;
      if (d && d.type === 'jst-theme' && ok(d.theme)) document.body.dataset.theme = d.theme;
    });
  })();
</script>
<!-- example:start -->
<div class="jst-accordion">
  <details name="lazyfaq">
    <summary>What does JST weigh?</summary>
    <div class="jst-accordion-body">About 11.5 KB gzipped, 7 KB runtime-only. This panel is ordinary inline content.</div>
  </details>
  <details name="lazyfaq" id="lazy-faq">
    <summary>Fetch this answer on open</summary>
    <div class="jst-accordion-body"><jst-include src="../fragments/faq_body.html" when="visible"><span class="jst-skeleton" style="inline-size: 70%"></span></jst-include></div>
  </details>
</div>
<!-- example:end -->
</body>
</html>
