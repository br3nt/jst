<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data table · JST components</title>
<link rel="stylesheet" href="../../jst-layout.css">
<link rel="stylesheet" href="../../jst-components.css">
<script type="module" src="../../jst.js"></script>
<script type="module" src="../../jst-behaviors.js"></script>
<style>
  body { margin: var(--jst-space-l); }
</style>
</head>
<body data-theme="jst">
<script>
  (function () {
    const ok = (t) => typeof t === 'string' && /^[a-z][a-z0-9]*$/.test(t);
    const p = new URLSearchParams(location.search).get('theme');
    if (ok(p)) document.body.dataset.theme = p;
    addEventListener('message', (e) => {
      const d = e.data;
      if (d && d.type === 'jst-theme' && ok(d.theme)) document.body.dataset.theme = d.theme;
    });
  })();
</script>
<jst-include src="../../jst-components.html"></jst-include>
<!-- example:start -->
<jst-table
  columns='[{"key":"name","label":"Name"},{"key":"role","label":"Role"},{"key":"commits","label":"Commits"}]'
  rows='[{"id":1,"name":"Ada","role":"Lead","commits":312},{"id":2,"name":"Linus","role":"Core","commits":987},{"id":3,"name":"Grace","role":"Core","commits":154},{"id":4,"name":"Alan","role":"Docs","commits":48}]'></jst-table>
<!-- example:end -->
</body>
</html>
