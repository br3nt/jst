<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carousel · JST components</title>
<link rel="stylesheet" href="../../jst-layout.css">
<link rel="stylesheet" href="../../jst-components.css">
<style>
  body { margin: var(--jst-space-l); }
</style>
</head>
<body data-theme="jst">
<script>
  (function () {
    const ok = (t) => typeof t === 'string' && /^[a-z][a-z0-9]*$/.test(t);
    const p = new URLSearchParams(location.search).get('theme');
    if (ok(p)) document.body.dataset.theme = p;
    addEventListener('message', (e) => {
      const d = e.data;
      if (d && d.type === 'jst-theme' && ok(d.theme)) document.body.dataset.theme = d.theme;
    });
  })();
</script>
<!-- example:start -->
<jst-reel data-carousel style="--space: 0">
  <jst-frame style="--ratio: 21 / 9; background: var(--jst-accent); color: var(--jst-accent-fg)"><strong>Slide one</strong></jst-frame>
  <jst-frame style="--ratio: 21 / 9; background: oklch(from var(--jst-accent) calc(l - 0.12) c h); color: var(--jst-accent-fg)"><strong>Slide two</strong></jst-frame>
  <jst-frame style="--ratio: 21 / 9; background: oklch(from var(--jst-accent) calc(l - 0.24) c h); color: var(--jst-accent-fg)"><strong>Slide three</strong></jst-frame>
</jst-reel>
<!-- example:end -->
</body>
</html>
