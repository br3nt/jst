<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dropdown menu · JST components</title>
<link rel="stylesheet" href="../../jst-layout.css">
<link rel="stylesheet" href="../../jst-components.css">
<style>
  body { margin: var(--jst-space-l); }
</style>
</head>
<body data-theme="jst">
<script>
  (function () {
    const ok = (t) => typeof t === 'string' && /^[a-z][a-z0-9]*$/.test(t);
    const p = new URLSearchParams(location.search).get('theme');
    if (ok(p)) document.body.dataset.theme = p;
    addEventListener('message', (e) => {
      const d = e.data;
      if (d && d.type === 'jst-theme' && ok(d.theme)) document.body.dataset.theme = d.theme;
    });
  })();
</script>
<!-- example:start -->
<button command="toggle-popover" commandfor="demo-menu" style="anchor-name: --actions-btn">Actions &#9662;</button>
<div class="jst-menu" popover id="demo-menu" style="position-anchor: --actions-btn">
  <button>Edit</button>
  <button>Duplicate</button>
  <button>Move to&hellip;</button>
  <hr>
  <button style="color:oklch(0.55 0.20 25)">Delete</button>
</div>
<!-- example:end -->
</body>
</html>
