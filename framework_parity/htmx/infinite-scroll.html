<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://htmx.org/examples/infinite-scroll/
  Demonstrates: as the last row scrolls into view, the next page is fetched and appended.
  JST status: ✓ exact - the sentinel row declares onreveal (JST's synthetic
  reveal event, opt-in for body HTML via unsafeInlineHandlers) and calls
  swap() to append the next page, then removes itself. No hand-rolled
  IntersectionObserver.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · infinite-scroll</title>
<script type="module" src="../../jst-nav.js"></script>
<script type="module">
  // The sentinel row uses the synthetic onreveal event in plain body HTML -
  // opt-in, since JST must evaluate the attribute string to wire it.
  import { configure } from '../../jst.js';
  configure({ unsafeInlineHandlers: true });
</script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: .5rem .6rem; border-bottom: 1px solid #eee; }
  .loading { text-align: center; color: #888; }
</style>
</head>
<body>

<h1>Infinite Scroll</h1>
<table><tbody id="rows" data-testid="rows"></tbody></table>

<script>
  // Mock backend: returns HTML rows for a page, plus a sentinel row carrying the
  // reveal trigger for the next page (the htmx "infinite scroll" shape).
  const PER = 20, TOTAL = 100;
  const origFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = new URL(url, location.origin);
    if (u.pathname === '/feed') {
      const page = Number(u.searchParams.get('page') || 1);
      const start = (page - 1) * PER;
      let html = '';
      for (let i = start; i < Math.min(start + PER, TOTAL); i++) {
        html += `<tr data-testid="row-${i + 1}"><td>${i + 1}</td><td>Agent ${i + 1}</td></tr>`;
      }
      if (start + PER < TOTAL) {
        html += `<tr class="sentinel" data-testid="sentinel" onreveal="JST.nav.swap('#rows', '/feed?page=${page + 1}', { swap: 'beforeend' }); this.remove()"><td colspan="2" class="loading">Loading more…</td></tr>`;
      }
      return new Response(html, { headers: { 'Content-Type': 'text/html' } });
    }
    return origFetch(url, opts);
  };

  // Initial page.
  addEventListener('DOMContentLoaded', async () => {
    document.getElementById('rows').innerHTML = await (await fetch('/feed?page=1')).text();
    window.__exampleReady = true;
  });

  // Headless assertion: IntersectionObserver may not fire un-scrolled, so drive
  // the sentinel's request directly (the same call `revealed` makes on scroll).
  window.__parityTest = async () => {
    const before = document.querySelectorAll('[data-testid^="row-"]').length;
    const s = document.querySelector('.sentinel');
    if (s) s.dispatchEvent(new CustomEvent('reveal'));
    await new Promise(r => setTimeout(r, 200));
    const after = document.querySelectorAll('[data-testid^="row-"]').length;
    return { ok: after > before, detail: `revealed trigger appended the next page (${before} → ${after} rows)` };
  };
</script>
</body>
</html>
