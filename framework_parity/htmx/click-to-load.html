<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://htmx.org/examples/click-to-load/
  Demonstrates: a table with a "Load More" button that fetches the next page of rows
  and appends them, until the server says there are no more.
  JST status: ✓ exact match. Page owns the rows array + page cursor; the button handler
  fetches the next page and concatenates; the component re-renders. No DOM surgery.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · click-to-load</title>
<script type="module" src="../../jst.js"></script>
<script src="../../framework_parity/lib/mock-fetch.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 3rem auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid #ddd; }
  button { padding: .5rem 1rem; cursor: pointer; margin-top: .8rem; }
</style>
</head>
<body>

<script type="jst" name="agent-table" attributes="rows more loading">
  <table>
    <thead><tr><th>Name</th><th>ID</th><th>Email</th></tr></thead>
    <tbody data-testid="rows">
      $ (rows || []).forEach(r => {
        <tr data-testid="row-$(r.id)"><td>$(r.name)</td><td>$(r.id)</td><td>$(r.email)</td></tr>
      $ })
    </tbody>
  </table>
  $ if (more) {
    <button data-testid="load-more" .disabled="$(loading)" onclick="$(() => el.emit('load'))">
      $(loading ? 'Loading…' : 'Load More Agents…')
    </button>
  $ }
</script>

<h1>Click To Load</h1>
<agent-table id="tbl"></agent-table>

<script>
  const PER_PAGE = 5, TOTAL = 13;
  JSTMock.route('GET /api/agents', req => {
    const page = Number(req.query.page || 1);
    const start = (page - 1) * PER_PAGE;
    const rows = [];
    for (let i = start; i < Math.min(start + PER_PAGE, TOTAL); i++) {
      rows.push({ id: 1000 + i, name: `Agent Smith ${i + 1}`, email: `agent${i + 1}@matrix.net` });
    }
    return { json: { rows, more: start + PER_PAGE < TOTAL, nextPage: page + 1 } };
  }, { delay: 120 });

  const tbl = document.getElementById('tbl');
  let rows = [], page = 1;
  tbl.rows = rows; tbl.more = true;

  async function loadPage() {
    tbl.loading = true;
    const data = await (await fetch(`/api/agents?page=${page}`)).json();
    rows = rows.concat(data.rows);
    page = data.nextPage;
    tbl.rows = rows;
    tbl.more = data.more;
    tbl.loading = false;
  }

  tbl.addEventListener('load', loadPage);
  loadPage().then(() => { window.__exampleReady = true; });
</script>
</body>
</html>
