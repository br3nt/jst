<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://htmx.org/examples/keyboard-shortcuts/
  Demonstrates: triggering a server action from a global keyboard shortcut. HTMX does this
  declaratively with hx-trigger="keyup[...] from:body" plus a key filter.
  JST status: (i) partial. The result panel is a clean JST component, BUT JST's @event can
  only bind to elements written in a template — there is no declarative document/body-level
  listener and no key-filter modifier. So the global shortcut is a hand-written
  document.addEventListener('keydown', ...) that matches the combo and fires the fetch.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · keyboard-shortcuts</title>
<script type="module" src="../../jst.js"></script>
<script src="../../framework_parity/lib/mock-fetch.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 3rem auto; }
  kbd { background: #eee; border: 1px solid #ccc; border-radius: 4px; padding: 1px 6px; }
  .panel { margin-top: 1rem; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; }
</style>
</head>
<body>

<script type="jst" name="shortcut-panel" attributes="lastKey content count">
  <div class="panel">
    <p data-testid="last">Last shortcut: <kbd>$(lastKey || '—')</kbd> (fired $(count || 0)×)</p>
    $ if (content) {
      <div data-testid="content">$(content)</div>
    $ }
  </div>
</script>

<h1>Keyboard Shortcuts</h1>
<p>Press <kbd>Shift</kbd>+<kbd>D</kbd> to fetch details, or <kbd>Shift</kbd>+<kbd>R</kbd> to reset.</p>
<shortcut-panel id="panel"></shortcut-panel>

<script>
  JSTMock.route('GET /api/details', () => ({ json: { content: 'Details loaded via keyboard shortcut.' } }), { delay: 60 });

  const panel = document.getElementById('panel');
  let count = 0;
  panel.count = 0;

  // Workaround: no declarative "from:body keyup[...]" trigger in JST; bind globally by hand.
  document.addEventListener('keydown', async e => {
    if (e.shiftKey && (e.key === 'D' || e.key === 'd')) {
      panel.lastKey = 'Shift+D';
      panel.count = ++count;
      const data = await (await fetch('/api/details')).json();
      panel.content = data.content;
    } else if (e.shiftKey && (e.key === 'R' || e.key === 'r')) {
      panel.lastKey = 'Shift+R';
      panel.count = ++count;
      panel.content = '';
    }
  });

  window.__exampleReady = true;
</script>
</body>
</html>
