<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://htmx.org/examples/update-other-content/ (load-polling / value-added polling)
  Demonstrates: content that refreshes on an interval, and a single response that
  updates MORE than one region of the page ("update other content").
  JST status: ✓ exact — jst-nav polls with `jst-trigger="every 500ms"` and the
  one response updates two separate regions via out-of-band swaps
  (`jst-swap-oob`), with `jst-swap="none"` on the poller itself.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · polling</title>
<script type="module" src="../../jst-nav.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 30rem; margin: 3rem auto; }
  .badge { display: inline-block; padding: .2rem .7rem; border-radius: 999px; color: white; }
  .badge.up { background: #2e7d32; } .badge.down { background: #c62828; }
  button { padding: .4rem 1rem; cursor: pointer; }
</style>
</head>
<body>

<h1>Load Polling</h1>
<p>Active users: <strong id="value" data-testid="value">—</strong> &nbsp;
   System: <span id="status" class="badge" data-testid="status">…</span></p>
<button id="stop" data-testid="stop">Stop polling</button>

<!-- A poller with jst-swap="none": the response carries OOB spans that update the
     two regions above. Removing this element stops the poll (interval self-clears). -->
<div id="poller" hidden jst-get="/api/metrics" jst-trigger="every 500ms" jst-swap="none"></div>

<script>
  let tick = 0;
  const origFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = new URL(url, location.origin);
    if (u.pathname === '/api/metrics') {
      tick++;
      const value = 100 + tick * 7;
      const status = tick % 3 === 0 ? 'down' : 'up';
      const html = `<strong id="value" jst-swap-oob="true" data-testid="value">${value}</strong>`
        + `<span id="status" class="badge ${status}" jst-swap-oob="true" data-testid="status">${status}</span>`;
      return new Response(html, { headers: { 'Content-Type': 'text/html' } });
    }
    return origFetch(url, opts);
  };

  document.getElementById('stop').addEventListener('click', () => document.getElementById('poller').remove());

  window.__exampleReady = true;
  window.__parityTest = async () => {
    await window.JST.nav.performRequest(document.getElementById('poller')); // one poll
    await new Promise(r => setTimeout(r, 150));
    const v = document.querySelector('[data-testid="value"]').textContent;
    const s = document.querySelector('[data-testid="status"]').textContent;
    return { ok: v !== '—' && (s === 'up' || s === 'down'), detail: `one response OOB-updated two regions (value=${v}, status=${s})` };
  };
</script>
</body>
</html>
