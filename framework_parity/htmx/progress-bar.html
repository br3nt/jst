<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://htmx.org/examples/progress-bar/
  Demonstrates: start a job, poll for progress, update a bar until complete, then
  show a restart state.
  JST status: ✓ exact — jst-nav polls declaratively with
  `jst-trigger="every 200ms"` + `jst-swap="outerHTML"`. The running response keeps
  the polling element; the done response drops it, so the poll stops itself.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · progress-bar</title>
<script type="module" src="../../jst-nav.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 30rem; margin: 3rem auto; }
  .track { background: #eee; border-radius: 999px; height: 20px; overflow: hidden; }
  .bar { background: #3f51b5; height: 100%; width: 0; transition: width .4s ease; }
  button { padding: .5rem 1rem; cursor: pointer; margin-top: 1rem; }
</style>
</head>
<body>

<h1>Progress Bar</h1>
<div id="job">
  <button data-testid="start" jst-action="/api/job" method="post" jst-target="#job" jst-swap="innerHTML">Start Job</button>
</div>

<script>
  let serverProgress = 0;
  const track = (p) => `<div role="progressbar" aria-valuenow="${p}" class="track"><div class="bar" data-testid="bar" style="width:${p}%"></div></div>`;
  const running = (p) => `<div class="poller" jst-get="/api/job" jst-trigger="every 200ms" jst-target="this" jst-swap="outerHTML">${track(p)}<p data-testid="running">Running… ${p}%</p></div>`;
  const done = () => `<div>${track(100)}<p data-testid="done">Complete!</p><button data-testid="restart" jst-action="/api/job" method="post" jst-target="#job" jst-swap="innerHTML">Restart Job</button></div>`;

  const origFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = new URL(url, location.origin);
    if (u.pathname === '/api/job') {
      const method = (opts && opts.method || 'GET').toUpperCase();
      if (method === 'POST') { serverProgress = 0; return new Response(running(0), { headers: { 'Content-Type': 'text/html' } }); }
      serverProgress = Math.min(100, serverProgress + 25);
      return new Response(serverProgress >= 100 ? done() : running(serverProgress), { headers: { 'Content-Type': 'text/html' } });
    }
    return origFetch(url, opts);
  };

  window.__exampleReady = true;
  window.__parityTest = async () => {
    await window.JST.nav.performRequest(document.querySelector('[data-testid="start"]'));
    await new Promise(r => setTimeout(r, 80));
    for (let i = 0; i < 6; i++) {
      const poller = document.querySelector('.poller');
      if (!poller) break;
      await window.JST.nav.performRequest(poller);
      await new Promise(r => setTimeout(r, 60));
    }
    return { ok: !!document.querySelector('[data-testid="done"]'), detail: 'polled to completion via the every-Ns trigger, then stopped' };
  };
</script>
</body>
</html>
