<!DOCTYPE html>
<!--
  Source: https://htmx.org/examples/active-search/
  Demonstrates: a search box that queries the server as you type (debounced) and swaps the
  results table; a spinner shows during the request.
  JST status: (i) partial. Page state + results component is idiomatic, BUT HTMX gives the
  debounce + "fire on keyup" declaratively (hx-trigger="keyup changed delay:500ms"). JST
  has no event-modifier/debounce primitive, so the 300ms debounce is a hand-written
  setTimeout. The input is kept a plain field so typing doesn't lose focus to re-renders.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · active-search</title>
<script type="module" src="../../jst.js"></script>
<script src="../../framework_parity/lib/mock-fetch.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 3rem auto; }
  input { padding: .5rem; width: 100%; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
  td, th { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid #eee; }
  .spinner { color: #888; }
</style>
</head>
<body>

<script type="jst" name="search-results" rows searching query>
  $ if (searching) {
    <span class="spinner" data-testid="spinner">Searching…</span>
  $ }
  <table>
    <thead><tr><th>Name</th><th>Email</th></tr></thead>
    <tbody data-testid="rows">
      $ (rows || []).forEach(r => {
        <tr data-testid="row-$(r.id)"><td>$(r.name)</td><td>$(r.email)</td></tr>
      $ })
    </tbody>
  </table>
  $ if (!searching && query && (rows || []).length === 0) {
    <p data-testid="empty">No matches for "$(query)".</p>
  $ }
</script>

<h1>Active Search</h1>
<input type="search" id="q" data-testid="q" placeholder="Search contacts…" autocomplete="off">
<search-results id="results"></search-results>

<script>
  const people = [
    { id: 1, name: 'Joe Smith', email: 'joe@smith.org' },
    { id: 2, name: 'Angie MacDowell', email: 'angie@macdowell.org' },
    { id: 3, name: 'Fuqua Tarkenton', email: 'fuqua@tarkenton.org' },
    { id: 4, name: 'Kim Yee', email: 'kim@yee.org' },
    { id: 5, name: 'Joey Ramone', email: 'joey@ramone.org' },
  ];
  JSTMock.route('GET /api/search', req => {
    const q = (req.query.q || '').toLowerCase();
    const rows = q ? people.filter(p => p.name.toLowerCase().includes(q) || p.email.toLowerCase().includes(q)) : people;
    return { json: { rows } };
  }, { delay: 120 });

  const q = document.getElementById('q');
  const results = document.getElementById('results');
  let timer = null;

  async function run(query) {
    results.searching = true;
    results.query = query;
    const data = await (await fetch(`/api/search?q=${encodeURIComponent(query)}`)).json();
    results.rows = data.rows;
    results.searching = false;
  }

  // Workaround: no declarative debounce in JST, so we time it by hand.
  q.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => run(q.value), 300);
  });

  run('').then(() => { window.__exampleReady = true; });
</script>
</body>
</html>
