<!DOCTYPE html>
<!--
  Source: https://vuejs.org/examples/#markdown
  Demonstrates: a live markdown editor — textarea input rendered to HTML preview,
  debounced. (Vue's own example loads `marked` from a CDN; we mirror that.)
  JST status: (i) partial — markdown rendering itself is exact. Two notes:
   1) Binding the <textarea> to state and re-rendering per keystroke would reset the
      caret (JST re-renders the whole component; morph rewrites the text node — the
      v-model gap), so the preview is updated imperatively from @input instead.
   2) The render helper lives in a plain <script>, not a template JS line, because the
      JST template lexer mis-tokenises `$` inside regex literals (e.g. /...$/). Moving
      regex-bearing logic to ordinary JS is a clean workaround.
  Falls back to a tiny inline renderer if the `marked` CDN is unavailable.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — Markdown Editor</title>
<script type="module" src="../../jst.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body{font-family:sans-serif;margin:0}
  .editor{display:flex;height:100vh}
  textarea{width:50%;border:none;border-right:1px solid #ccc;padding:1rem;font-family:monospace;font-size:14px;resize:none}
  .preview{width:50%;padding:1rem;overflow:auto}
</style>
<script>
  // Render helper in plain JS (regex with `$` anchors is fine here).
  function renderMarkdown(src) {
    src = src || '';
    if (window.marked) return marked.parse(src);
    var esc = src.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return '<p>' + esc
      .replace(/^### (.*)$/gm, '</p><h3>$1</h3><p>')
      .replace(/^## (.*)$/gm, '</p><h2>$1</h2><p>')
      .replace(/^# (.*)$/gm, '</p><h1>$1</h1><p>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n{2,}/g, '</p><p>') + '</p>';
  }
</script>
</head>
<body>

<script type="jst" name="markdown-editor" input>
  $ if (!el.__mounted) {
  $   el.__mounted = true;
  $   queueMicrotask(() => { el.querySelector('#preview').innerHTML = renderMarkdown(el.input); });
  $ }
  $ const onInput = (e) => {
  $   clearTimeout(el.__t);
  $   const v = e.target.value;
  $   el.__t = setTimeout(() => { el.querySelector('#preview').innerHTML = renderMarkdown(v); }, 100);
  $ };
  <div class="editor">
    <textarea id="src" @input="$(onInput)">$(input)</textarea>
    <div class="preview" id="preview"></div>
  </div>
</script>

<markdown-editor id="app" input="# Hello

This is **markdown**, rendered live."></markdown-editor>

<script>window.__exampleReady = true;</script>
</body>
</html>
