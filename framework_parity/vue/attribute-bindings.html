<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://vuejs.org/examples/#attribute-bindings
  Demonstrates: binding dynamic values to attributes (title, href, class) and a
  conditional boolean attribute (disabled).
  JST status: ✓ exact — interpolation works inside attribute values; boolean DOM
  attributes are set via a .prop binding.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — Attribute Bindings</title>
<script type="module" src="../../jst.js"></script>
<style>.danger{color:#c00;font-weight:bold}</style>
</head>
<body>

<script type="jst" name="attribute-bindings" props="message linkHref disabled">
  <p id="hover" title="$(message)">Hover me for a tooltip (title attribute is bound).</p>
  <a id="link" href="$(url(linkHref))">A link with a bound href</a>
  <p id="dyn" class="$(disabled ? 'danger' : '')">Class is bound to state.</p>
  <button id="btn" .disabled="$(disabled)">I may be disabled</button>
  <button id="toggle" onclick="$(() => el.disabled = !el.disabled)">Toggle disabled</button>
</script>

<attribute-bindings id="app"
  message="You loaded this page on a great day!"
  link-href="https://vuejs.org"
  disabled="false"></attribute-bindings>

<script>
  window.__parityTest = async () => {
    document.getElementById('toggle').click();
    await new Promise(resolve => setTimeout(resolve, 0));
    return { ok: document.getElementById('btn').disabled && document.getElementById('dyn').classList.contains('danger'), detail: 'property and class bindings update' };
  };
  window.__exampleReady = true;
</script>
</body>
</html>
