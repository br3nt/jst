<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://vuejs.org/examples/#form-bindings
  Demonstrates: v-model across text, checkbox, multiple checkboxes, radio, select,
  and multi-select.
  JST status: (i) partial - `jst-model` covers the local text, checkbox, radio,
  select, checkbox-array, and multi-select shapes here. Vue's v-model still has
  broader component-level conventions, but the native form binding behavior is
  direct.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST - Form Bindings</title>
<script type="module" src="../../jst.js"></script>
<style>body{font-family:sans-serif;max-width:520px;margin:2rem auto}fieldset{margin-bottom:1rem}pre{background:#f4f4f4;padding:1rem;border-radius:6px}</style>
</head>
<body>

<script type="jst" name="form-bindings" attributes="text checked checkednames picked selected multiselected">
  $ const names = checkednames || [];
  $ const multi = multiselected || [];

  <fieldset>
    <legend>Text input</legend>
    <input id="text" jst-model="text">
    <p>Message is: <strong id="text-out">$(text)</strong></p>
  </fieldset>

  <fieldset>
    <legend>Checkbox (single)</legend>
    <label><input id="checkbox" type="checkbox" jst-model="checked"> $(checked ? 'true' : 'false')</label>
  </fieldset>

  <fieldset>
    <legend>Multiple checkboxes</legend>
    $ ['Jack','John','Mike'].forEach(name => {
      <label><input type="checkbox" value="$(name)" jst-model="checkednames"> $(name)</label>
    $ })
    <p>Checked names: <span id="names-out">$(names.join(', '))</span></p>
  </fieldset>

  <fieldset>
    <legend>Radio</legend>
    <label><input type="radio" name="pick" value="One" jst-model="picked"> One</label>
    <label><input type="radio" name="pick" value="Two" jst-model="picked"> Two</label>
    <p>Picked: <span id="picked-out">$(picked)</span></p>
  </fieldset>

  <fieldset>
    <legend>Select</legend>
    <select id="select" jst-model="selected">
      $ ['A','B','C'].forEach(opt => {
        <option value="$(opt)">$(opt)</option>
      $ })
    </select>
    <p>Selected: <span id="select-out">$(selected)</span></p>
  </fieldset>

  <fieldset>
    <legend>Multi-select</legend>
    <select id="multiselect" multiple size="3" jst-model="multiselected">
      $ ['A','B','C'].forEach(opt => {
        <option value="$(opt)">$(opt)</option>
      $ })
    </select>
    <p>Selected: <span id="multi-out">$(multi.join(', '))</span></p>
  </fieldset>

  <pre id="state">$(JSON.stringify({text, checked, checkednames: names, picked, selected, multiselected: multi}, null, 2))</pre>
</script>

<form-bindings id="app"
  text="Edit me"
  checked="true"
  checkednames='["Jack"]'
  picked="One"
  selected="A"
  multiselected='["A"]'></form-bindings>

<script>window.__exampleReady = true;</script>
</body>
</html>
