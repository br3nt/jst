<!DOCTYPE html>
<!--
  Source: https://vuejs.org/guide/essentials/template-refs
  Demonstrates: getting a direct reference to a DOM element to call imperative APIs
  (e.g. focus an input).
  JST status: (i) partial — JST has no `ref` declaration that hands you a node. The
  equivalent capability exists via el.querySelector(...) inside the component (the
  component element IS the host of its light DOM). Fully functional; just a different
  API and you must query after render rather than receive a bound ref.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — Template Refs</title>
<script type="module" src="../../jst.js"></script>
</head>
<body>

<script type="jst" name="refs-demo" >
  $ const focusInput = () => el.querySelector('#the-input').focus();
  $ const measure = () => {
  $   const box = el.querySelector('#box');
  $   el.querySelector('#dims').textContent =
  $     box.offsetWidth + ' x ' + box.offsetHeight + ' px';
  $ };
  <input id="the-input" placeholder="I can be focused imperatively">
  <button id="focus" @click="$(focusInput)">Focus the input (ref-style)</button>
  <div id="box" style="width:120px;height:40px;background:#cde">a box</div>
  <button id="do-measure" @click="$(measure)">Measure the box via its ref</button>
  <p id="dims">dimensions: (click measure)</p>
</script>

<refs-demo id="app"></refs-demo>

<script>window.__exampleReady = true;</script>
</body>
</html>
