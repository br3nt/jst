<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://vuejs.org/examples/#hello-world
  Demonstrates: reactive text - a value rendered into the DOM that updates when it changes.
  JST status: (i) partial - reactive text is exact, but Vue's v-model on the input is
  reproduced as a manual one-way binding (.value) + @input handler (JST has no v-model).
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST - Hello World</title>
<script type="module" src="../../jst.js"></script>
</head>
<body>

<!-- Self-contained widget: owns its own `message` as local state. -->
<script type="jst" name="hello-world" attributes="message">
  <h1 id="greeting">$(message)</h1>
  <input id="msg-input" .value="$(message)"
         oninput="const e = event; el.message = e.target.value">
</script>

<hello-world id="app" message="Hello World!"></hello-world>

<script>
  // Reactivity check: setting the prop property re-renders the <h1>.
  window.__exampleReady = true;
</script>
</body>
</html>
