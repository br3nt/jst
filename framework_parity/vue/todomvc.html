<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://vuejs.org/examples/#todomvc
  Demonstrates: full TodoMVC — add, toggle, toggle-all, double-click to edit
  (enter/blur to commit, escape to cancel), delete, hash-route filters
  (all/active/completed), clear-completed, item count, localStorage persistence.
  JST status: (i) partial — all behaviour is reproduced. This parent-owned state
  example keeps explicit input events, while property-aware morphing preserves
  form state. Edit-focus still uses a queued microtask after render, which is a
  manual step Vue gives free.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — TodoMVC</title>
<script type="module" src="../../jst.js"></script>
<style>
  body{font-family:'Helvetica Neue',sans-serif;background:#f5f5f5;color:#4d4d4d;max-width:550px;margin:2rem auto}
  h1{font-size:60px;font-weight:100;text-align:center;color:#b83f45}
  .box{background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.2)}
  .new-todo,.edit{width:100%;padding:16px;border:1px solid #ddd;box-sizing:border-box;font-size:18px}
  ul{list-style:none;margin:0;padding:0}
  li{border-bottom:1px solid #ededed;display:flex;align-items:center;padding:8px 12px}
  li.completed label{color:#aaa;text-decoration:line-through}
  li label{flex:1;padding:0 10px}
  .toggle{width:24px;height:24px}
  .destroy{border:none;background:none;color:#cc9a9a;cursor:pointer;font-size:20px}
  .footer{display:flex;justify-content:space-between;align-items:center;padding:10px;font-size:14px;color:#777}
  .filters a{margin:0 4px;text-decoration:none;color:inherit;padding:2px 6px;border:1px solid transparent;border-radius:3px}
  .filters a.selected{border-color:#b83f45}
  li.editing .view{display:none}
  li:not(.editing) .edit{display:none}
</style>
</head>
<body>

<script type="jst" name="todo-mvc" props="todos filter editingid">
  $ const items = todos || [];
  $ const flt = filter || 'all';
  $ const remaining = items.filter(t => !t.done).length;
  $ const shown = items.filter(t => flt === 'active' ? !t.done : flt === 'completed' ? t.done : true);

  $ const save = (next) => { el.todos = next; localStorage.setItem('jst-todomvc', JSON.stringify(next)); };
  $ const add = (e) => {
  $   if (e.key !== 'Enter') return;
  $   const title = e.target.value.trim(); if (!title) return;
  $   save([...items, { id: Date.now(), title, done: false }]); e.target.value = '';
  $ };
  $ const toggle = (id) => save(items.map(t => t.id === id ? { ...t, done: !t.done } : t));
  $ const toggleAll = (on) => save(items.map(t => ({ ...t, done: on })));
  $ const destroy = (id) => save(items.filter(t => t.id !== id));
  $ const clearCompleted = () => save(items.filter(t => !t.done));
  $ const startEdit = (id) => { el.editingid = id; };
  $ const commit = (id, value) => {
  $   const title = value.trim();
  $   if (!title) { destroy(id); } else { save(items.map(t => t.id === id ? { ...t, title } : t)); }
  $   el.editingid = null;
  $ };
  $ const cancel = () => { el.editingid = null; };

  $ if (editingid != null) {
  $   queueMicrotask(() => {
  $     const inp = el.querySelector('li.editing input.edit');
  $     if (inp && document.activeElement !== inp) { inp.focus(); inp.select(); }
  $   });
  $ }

  <h1>todos</h1>
  <div class="box">
    <input id="new-todo" class="new-todo" placeholder="What needs to be done?" onkeyup="$(add)">
    <div>
      <label><input id="toggle-all" type="checkbox" .checked="$(items.length > 0 && remaining === 0)"
        onchange="$(e => toggleAll(e.target.checked))"> Mark all as complete</label>
    </div>
    <ul id="list">
      $ shown.forEach(todo => {
        <li class="$(todo.done ? 'completed ' : '')$(editingid === todo.id ? 'editing' : '')" data-id="$(todo.id)">
          <div class="view">
            <input class="toggle" type="checkbox" .checked="$(todo.done)" onchange="$(() => toggle(todo.id))">
            <label ondblclick="$(() => startEdit(todo.id))">$(todo.title)</label>
            <button class="destroy" onclick="$(() => destroy(todo.id))">×</button>
          </div>
          <input class="edit" .value="$(todo.title)"
            onkeyup="$(e => { if (e.key === 'Enter') commit(todo.id, e.target.value); if (e.key === 'Escape') cancel(); })"
            onblur="$(e => { if (editingid === todo.id) commit(todo.id, e.target.value); })">
        </li>
      $ })
    </ul>
    $ if (items.length) {
      <div class="footer">
        <span id="count"><strong>$(remaining)</strong> item$(remaining === 1 ? '' : 's') left</span>
        <span class="filters">
          <a href="#/" class="$(flt === 'all' ? 'selected' : '')">All</a>
          <a href="#/active" class="$(flt === 'active' ? 'selected' : '')">Active</a>
          <a href="#/completed" class="$(flt === 'completed' ? 'selected' : '')">Completed</a>
        </span>
        $ if (items.some(t => t.done)) {
          <button id="clear" class="destroy" onclick="$(clearCompleted)">Clear completed</button>
        $ }
      </div>
    $ }
  </div>
</script>

<todo-mvc id="app" filter="all"></todo-mvc>

<script>
  const app = document.getElementById('app');
  const stored = localStorage.getItem('jst-todomvc');
  app.todos = stored ? JSON.parse(stored) : [
    { id: 1, title: 'Taste JST', done: true },
    { id: 2, title: 'Build a TodoMVC', done: false },
  ];

  function syncFilterFromHash() {
    const map = { '#/active': 'active', '#/completed': 'completed' };
    app.filter = map[location.hash] || 'all';
  }
  window.addEventListener('hashchange', syncFilterFromHash);
  syncFilterFromHash();

  window.__exampleReady = true;
</script>
</body>
</html>
