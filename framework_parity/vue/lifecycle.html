<!DOCTYPE html>
<!--
  Source: https://vuejs.org/guide/essentials/lifecycle
  Demonstrates: lifecycle hooks (onMounted / onUpdated / onUnmounted).
  JST status: (i) partial — JST exposes NO user lifecycle hooks; connectedCallback is
  internal to the framework. Approximations used here:
    * "mounted"   -> a one-time guard in the template (el.__mounted) that schedules a
                     microtask after the first render (DOM is present by then).
    * "updated"   -> every render is an "update"; we count renders in the template.
    * "unmounted" -> NO equivalent. There is no disconnect hook a component author can
                     run cleanup in. This is a genuine gap (timers/listeners owned by a
                     component cannot be torn down by the component itself).
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — Lifecycle Hooks</title>
<script type="module" src="../../jst.js"></script>
</head>
<body>

<script type="jst" name="lifecycle-demo" message>
  $ el.__renders = (el.__renders || 0) + 1;     // "onUpdated": runs every render
  $ if (!el.__mounted) {                          // "onMounted": one-time guard
  $   el.__mounted = true;
  $   queueMicrotask(() => {
  $     el.querySelector('#mounted-text').textContent = 'mounted! (the component is now in the DOM)';
  $   });
  $ }
  <p id="message">$(message)</p>
  <p id="mounted-text">not mounted yet</p>
  <p id="render-count">renders: $(el.__renders)</p>
  <button id="bump" @click="$(() => el.message = message + '!')">Trigger update</button>
</script>

<lifecycle-demo id="app" message="Hello"></lifecycle-demo>

<script>window.__exampleReady = true;</script>
</body>
</html>
