<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://vuejs.org/guide/essentials/lifecycle
  Demonstrates: lifecycle hooks (onMounted / onUpdated / onUnmounted).
  JST status: ✓ exact — JST's narrow lifecycle API covers this example:
    * "mounted"   -> `once()` runs after the first DOM commit.
    * "updated"   -> every render is an "update"; we count renders in the template.
    * "unmounted" -> the cleanup returned by `once()`.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — Lifecycle Hooks</title>
<script type="module" src="../../jst.js"></script>
</head>
<body>

<script type="jst" name="lifecycle-demo" props="message">
  $ el.__renders = (el.__renders || 0) + 1;     // "onUpdated": runs every render
  $ once('lifecycle', () => {
  $   el.querySelector('#mounted-text').textContent = 'mounted! (the component is now in the DOM)';
  $   return () => { window.__lifecycleDisconnected = true; };
  $ });
  <p id="message">$(message)</p>
  <p id="mounted-text">not mounted yet</p>
  <p id="render-count">renders: $(el.__renders)</p>
  <button id="bump" onclick="$(() => el.message = (el.message || '') + '!')">Trigger update</button>
</script>

<lifecycle-demo id="app" message="Hello"></lifecycle-demo>

<script>
  window.__parityTest = async () => {
    await new Promise(resolve => setTimeout(resolve, 0));
    const app = document.getElementById('app');
    const mounted = app.querySelector('#mounted-text').textContent.startsWith('mounted!');
    const before = app.querySelector('#render-count').textContent;
    app.querySelector('#bump').click();
    await new Promise(resolve => setTimeout(resolve, 0));
    const updated = app.querySelector('#render-count').textContent !== before;
    app.remove();
    return { ok: mounted && updated && window.__lifecycleDisconnected === true, detail: 'mount, update, cleanup' };
  };
  window.__exampleReady = true;
</script>
</body>
</html>
