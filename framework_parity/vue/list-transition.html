<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://vuejs.org/examples/#list-transition
  Demonstrates: animating items entering/leaving/moving in a list
  (<transition-group> with FLIP move animations in Vue).
  JST status: (i) partial — `jst-key` preserves identity and `jst-transition`
  provides enter/leave/move classes. It does not implement Vue's full FLIP
  transition-group calculations, so complex move animations still need custom JS.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — List Transition</title>
<script type="module" src="../../jst.js"></script>
<style>
  body{font-family:sans-serif;max-width:420px;margin:2rem auto}
  ul{list-style:none;padding:0}
  li{background:#42b883;color:#fff;margin:4px 0;padding:10px;border-radius:4px}
  .list-enter-active,.list-leave-active,.list-move{transition:opacity .25s ease,transform .25s ease}
  .list-enter-from,.list-leave-to{opacity:0;transform:translateX(-24px)}
  .list-enter-to,.list-leave-from{opacity:1;transform:none}
  button{margin-right:6px;padding:6px 10px;cursor:pointer}
</style>
</head>
<body>

<script type="jst" name="list-transition" attributes="items">
  $ const list = items || [];
  $ const append = () => el.items = [...list, list.length ? Math.max(...list) + 1 : 1];
  $ const pop = () => el.items = list.slice(0, -1);
  $ const reset = () => el.items = [1,2,3,4,5];
  <div>
    <button id="add" onclick="append(event)">Append item</button>
    <button id="remove" onclick="pop(event)">Remove last</button>
    <button id="reset" onclick="reset(event)">Reset</button>
  </div>
  <ul id="list">
    $ list.forEach(n => {
      <li jst-key="$(n)" jst-transition="list">$(n)</li>
    $ })
  </ul>
</script>

<list-transition id="app" items="[1,2,3,4,5]"></list-transition>

<script>window.__exampleReady = true;</script>
</body>
</html>
