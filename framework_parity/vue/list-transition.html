<!DOCTYPE html>
<!--
  Source: https://vuejs.org/examples/#list-transition
  Demonstrates: animating items entering/leaving/moving in a list
  (<transition-group> with FLIP move animations in Vue).
  JST status: (i) partial — biggest stretch in this set. JST has no transition system
  and no keyed reconciliation:
    * ENTER: a CSS @keyframes fade/slide plays on freshly-created <li> nodes, so
      APPENDING a row animates correctly.
    * LEAVE: NOT reproducible — JST removes the DOM node immediately on re-render; there
      is no hook to hold the node while an exit animation plays.
    * MOVE / insert-at-front: NOT faithful — morphing is index-based (no keys), so
      inserting/removing in the middle re-labels existing nodes in place and animates
      whichever node happens to be created at the end, not the logically-new item. Vue's
      FLIP move animation has no equivalent.
  So: append + reset animate nicely; ordering changes do not. Documented, not hidden.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — List Transition</title>
<script type="module" src="../../jst.js"></script>
<style>
  body{font-family:sans-serif;max-width:420px;margin:2rem auto}
  ul{list-style:none;padding:0}
  li{background:#42b883;color:#fff;margin:4px 0;padding:10px;border-radius:4px;
     animation:slide-in .4s ease both}
  @keyframes slide-in{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:none}}
  button{margin-right:6px;padding:6px 10px;cursor:pointer}
</style>
</head>
<body>

<script type="jst" name="list-transition" items>
  $ const list = items || [];
  $ const append = () => el.items = [...list, list.length ? Math.max(...list) + 1 : 1];
  $ const pop = () => el.items = list.slice(0, -1);
  $ const reset = () => el.items = [1,2,3,4,5];
  <div>
    <button id="add" @click="$(append)">Append item</button>
    <button id="remove" @click="$(pop)">Remove last</button>
    <button id="reset" @click="$(reset)">Reset</button>
  </div>
  <ul id="list">
    $ list.forEach(n => {
      <li>$(n)</li>
    $ })
  </ul>
</script>

<list-transition id="app" items="[1,2,3,4,5]"></list-transition>

<script>window.__exampleReady = true;</script>
</body>
</html>
