<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://vuejs.org/guide/essentials/class-and-style
  Demonstrates: conditional class binding (object/array syntax in Vue) and inline
  style binding.
  JST status: ✓ exact (different ergonomics) — JST has no object/array :class sugar,
  but the class and style strings are built with plain expressions in the attribute,
  which covers every case Vue's sugar does. Acceptable.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — Class & Style Bindings</title>
<script type="module" src="../../jst.js"></script>
<style>
  .box{padding:1rem;border:1px solid #ccc;margin:.5rem 0}
  .active{background:#dff0d8}
  .text-danger{color:#a00;font-weight:bold}
</style>
</head>
<body>

<script type="jst" name="class-style" props="active haserror color size">
  $ // Vue object syntax {active: isActive, 'text-danger': hasError}
  $ const cls = ['box', active ? 'active' : '', haserror ? 'text-danger' : ''].filter(Boolean).join(' ');
  <div id="target" class="$(cls)"
       style="color: $(color); font-size: $(size)px">
    Bound class = "$(cls)"
  </div>
  <button id="toggle-active" @click="$(() => el.active = !el.active)">Toggle active</button>
  <button id="toggle-error" @click="$(() => el.haserror = !el.haserror)">Toggle error</button>
  <button id="grow" @click="$(() => el.size = (el.size || 0) + 2)">Grow text</button>
</script>

<class-style id="app" active="true" haserror="false" color="#333" size="16"></class-style>

<script>window.__exampleReady = true;</script>
</body>
</html>
