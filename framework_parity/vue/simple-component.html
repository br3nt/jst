<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://vuejs.org/examples/#simple-component
  Demonstrates: defining a child component and passing it data via props.
  JST status: ✓ exact — declare a component, pass primitives via attributes and rich
  data via a .prop binding (.todo="$(item)").
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST — Simple Component</title>
<script type="module" src="../../jst.js"></script>
</head>
<body>

<!-- Child: a dumb renderer taking one prop. -->
<script type="jst" name="todo-item" todo>
  <li>$(todo.text)</li>
</script>

<!-- Parent: owns the list, passes each item down as a property. -->
<script type="jst" name="todo-grocery" groceries>
  <ol id="grocery-list">
    $ (groceries || []).forEach(item => {
      <todo-item .todo="$(item)"></todo-item>
    $ })
  </ol>
</script>

<todo-grocery id="app"></todo-grocery>

<script>
  document.getElementById('app').groceries = [
    { id: 0, text: 'Vegetables' },
    { id: 1, text: 'Cheese' },
    { id: 2, text: 'Whatever else humans are supposed to eat' },
  ];
  window.__exampleReady = true;
</script>
</body>
</html>
