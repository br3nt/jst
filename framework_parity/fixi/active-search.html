<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://github.com/bigskysoftware/fixi#readme  (active-search, mirrors htmx)
  Demonstrates: a search box that POSTs as you type and swaps a results table.
  JST status: (i) partial. The page state + <search-results> renderer is idiomatic, but the
  debounced keystroke trigger is hand-written. This is parity, not a deficiency: fixi-core
  also OMITS debounce — htmx's `hx-trigger="keyup changed delay:300ms"` is a user-land
  EXTENSION in fixi too, so a hand-wired setTimeout debounce is exactly what fixi requires.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · fixi · active-search</title>
<script type="module" src="../../jst.js"></script>
<script src="../../framework_parity/lib/mock-fetch.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 3rem auto; }
  input { padding: .5rem; width: 100%; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
  td, th { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid #eee; }
  .spinner { color: #888; }
</style>
</head>
<body>

<script type="jst" name="search-results" props="rows searching query">
  $ if (searching) {
    <span class="spinner" data-testid="spinner">Searching…</span>
  $ }
  <table>
    <thead><tr><th>Name</th><th>Email</th></tr></thead>
    <tbody data-testid="rows">
      $ (rows || []).forEach(r => {
        <tr data-testid="row-$(r.id)"><td>$(r.name)</td><td>$(r.email)</td></tr>
      $ })
    </tbody>
  </table>
  $ if (!searching && query && (rows || []).length === 0) {
    <p data-testid="empty">No matches for "$(query)".</p>
  $ }
</script>

<h1>Active Search</h1>
<input type="search" id="q" data-testid="q" placeholder="Search contacts…" autocomplete="off">
<search-results id="results"></search-results>

<script>
  const people = [
    { id: 1, name: 'Joe Smith', email: 'joe@smith.org' },
    { id: 2, name: 'Angie MacDowell', email: 'angie@macdowell.org' },
    { id: 3, name: 'Fuqua Tarkenton', email: 'fuqua@tarkenton.org' },
    { id: 4, name: 'Kim Yee', email: 'kim@yee.org' },
    { id: 5, name: 'Joey Ramone', email: 'joey@ramone.org' },
  ];
  JSTMock.route('POST /api/search', req => {
    const q = (req.form.q || '').toLowerCase();
    const rows = q ? people.filter(p => p.name.toLowerCase().includes(q) || p.email.toLowerCase().includes(q)) : people;
    return { json: { rows } };
  }, { delay: 120 });

  const q = document.getElementById('q');
  const results = document.getElementById('results');
  let timer = null;

  async function run(query) {
    results.searching = true;
    results.query = query;
    const data = await (await fetch('/api/search', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ q: query }),
    })).json();
    results.rows = data.rows;
    results.searching = false;
  }

  // fixi-core has no debounce; the trigger orchestration is hand-written, as it would be in fixi.
  q.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => run(q.value), 300);
  });

  window.__parityTest = async () => {
    q.value = 'angie';
    q.dispatchEvent(new Event('input', { bubbles: true }));
    const rowCount = () => document.querySelectorAll('[data-testid="rows"] tr').length;
    for (let i = 0; i < 30 && rowCount() !== 1; i++) {
      await new Promise(r => setTimeout(r, 100));
    }
    const onlyAngie = rowCount() === 1 && document.querySelector('[data-testid="row-2"]');
    return { ok: Boolean(onlyAngie), detail: 'debounced POST per keystroke filters results' };
  };

  run('').then(() => { window.__exampleReady = true; });
</script>
</body>
</html>
