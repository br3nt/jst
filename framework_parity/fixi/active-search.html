<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://github.com/bigskysoftware/fixi (debounced active search)
  Demonstrates: a search box that queries as you type (debounced) and swaps results.
  JST status: ✓ exact — the cause is jst-oninput="typeahead", a named shaper
  registered with the JST combinators (changed + debounce 300ms) — the debounced
  behaviour fixi-core omits; the input's value is sent and in-flight requests abort.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · fixi active-search</title>
<script type="module" src="../../jst-nav.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 3rem auto; }
  input { padding: .5rem; width: 100%; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
  td, th { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid #eee; }
</style>
</head>
<body>

<h1>Active Search</h1>
<input type="search" id="q" data-testid="q" name="q" placeholder="Search contacts…" autocomplete="off"
       jst-get="/api/search" jst-oninput="typeahead" jst-target="#results" jst-swap="innerHTML">
<div id="results"></div>

<script type="module">
  // The cause is the input event, paced by a named shaper — same combinators
  // templates use; the attribute value is an inert name, never code.
  import { changed, debounce } from "../../jst.js";
  import { shape } from "../../jst-nav.js";
  shape("typeahead", fire => changed(debounce(300, fire)));
</script>

<script>
  const people = [
    { id: 1, name: 'Joe Smith', email: 'joe@smith.org' },
    { id: 2, name: 'Angie MacDowell', email: 'angie@macdowell.org' },
    { id: 3, name: 'Fuqua Tarkenton', email: 'fuqua@tarkenton.org' },
    { id: 4, name: 'Kim Yee', email: 'kim@yee.org' },
    { id: 5, name: 'Joey Ramone', email: 'joey@ramone.org' },
  ];
  const rowsHtml = (list) => list.length
    ? '<table><thead><tr><th>Name</th><th>Email</th></tr></thead><tbody data-testid="rows">'
      + list.map(p => `<tr data-testid="row-${p.id}"><td>${p.name}</td><td>${p.email}</td></tr>`).join('')
      + '</tbody></table>'
    : '<p data-testid="empty">No matches.</p>';
  const origFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = new URL(url, location.origin);
    if (u.pathname === '/api/search') {
      const q = (u.searchParams.get('q') || '').toLowerCase();
      const rows = q ? people.filter(p => p.name.toLowerCase().includes(q) || p.email.toLowerCase().includes(q)) : people;
      return new Response(rowsHtml(rows), { headers: { 'Content-Type': 'text/html' } });
    }
    return origFetch(url, opts);
  };
  addEventListener('DOMContentLoaded', async () => {
    document.getElementById('results').innerHTML = await (await fetch('/api/search')).text();
    window.__exampleReady = true;
  });
  window.__parityTest = async () => {
    const input = document.getElementById('q');
    input.value = 'joe';
    if (window.JST && window.JST.nav) await window.JST.nav.performRequest(input);
    await new Promise(r => setTimeout(r, 150));
    const n = document.querySelectorAll('[data-testid^="row-"]').length;
    return { ok: n >= 1 && n < people.length, detail: `"joe" filtered to ${n} rows via the typeahead shaper` };
  };
</script>
</body>
</html>
