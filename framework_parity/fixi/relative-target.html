<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://github.com/bigskysoftware/fixi (relative selectors extension)
  Demonstrates: placing a response into a RELATIVE target instead of a global id.
  JST status: ✓ exact - jst-nav's `jst-target="closest .row find output"` resolves
  the trigger-relative target with 100% standard CSS selectors (closest + find).
  No global ids; fixi-core needs its extension for next/closest/find.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · fixi relative-target</title>
<script type="module" src="../../jst-nav.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 30rem; margin: 3rem auto; }
  .row { display: flex; align-items: center; gap: .8rem; padding: .4rem 0; border-bottom: 1px solid #eee; }
  .row button { padding: .25rem .7rem; cursor: pointer; }
  output { font-weight: 600; color: #3f51b5; }
</style>
</head>
<body>

<h1>Relative target (no global ids)</h1>
<div data-testid="rows">
  <div class="row" data-testid="row-alpha"><a role="button" class="lookup" data-testid="lookup-alpha" href="/api/lookup/alpha" jst-target="closest .row find output" jst-swap="innerHTML">Resolve "alpha"</a><output data-testid="out-alpha">—</output></div>
  <div class="row" data-testid="row-bravo"><a role="button" class="lookup" data-testid="lookup-bravo" href="/api/lookup/bravo" jst-target="closest .row find output" jst-swap="innerHTML">Resolve "bravo"</a><output data-testid="out-bravo">—</output></div>
  <div class="row" data-testid="row-charlie"><a role="button" class="lookup" data-testid="lookup-charlie" href="/api/lookup/charlie" jst-target="closest .row find output" jst-swap="innerHTML">Resolve "charlie"</a><output data-testid="out-charlie">—</output></div>
</div>

<script>
  const origFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = new URL(url, location.origin);
    const m = u.pathname.match(/^\/api\/lookup\/(.+)$/);
    if (m) return new Response(decodeURIComponent(m[1]).toUpperCase() + ' ✓', { headers: { 'Content-Type': 'text/html' } });
    return origFetch(url, opts);
  };
  window.__exampleReady = true;
  window.__parityTest = async () => {
    document.querySelector('[data-testid="lookup-bravo"]').click();
    await new Promise(r => setTimeout(r, 150));
    const hit = document.querySelector('[data-testid="out-bravo"]').textContent === 'BRAVO ✓';
    const otherUntouched = document.querySelector('[data-testid="out-alpha"]').textContent === '—';
    return { ok: hit && otherUntouched, detail: 'response placed into the trigger-relative <output> only' };
  };
</script>
</body>
</html>
