<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://github.com/bigskysoftware/fixi (native View Transitions)
  Demonstrates: swapping content through the View Transition API so old → new animates.
  JST status: ✓ exact - jst-nav's `jst-swap="transition"` wraps the swap in
  document.startViewTransition (the same View Transition API fixi uses), falling
  back to a plain swap where unsupported.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · fixi view-transition</title>
<script type="module" src="../../jst-nav.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 30rem; margin: 3rem auto; }
  .stage { position: relative; height: 8rem; }
  .panel { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
           border-radius: 10px; color: white; font-size: 1.4rem; }
  ::view-transition-old(root), ::view-transition-new(root) { animation-duration: .4s; }
  button { padding: .5rem 1rem; cursor: pointer; margin-top: 1rem; }
</style>
</head>
<body>

<h1>Animated content swap</h1>
<div class="stage" id="stage">
  <div class="panel" data-testid="panel" style="background:#3f51b5"><span data-testid="panel-title">Panel one</span></div>
</div>
<a role="button" data-testid="next" href="/panel/next" jst-target="#stage" jst-swap="transition">Next panel</a>

<script>
  const panels = [
    { title: 'Panel one', color: '#3f51b5' },
    { title: 'Panel two', color: '#2e7d32' },
    { title: 'Panel three', color: '#c62828' },
  ];
  let idx = 0;
  const origFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = new URL(url, location.origin);
    if (u.pathname === '/panel/next') {
      idx = (idx + 1) % panels.length;
      const p = panels[idx];
      return new Response(`<div class="panel" data-testid="panel" style="background:${p.color}"><span data-testid="panel-title">${p.title}</span></div>`, { headers: { 'Content-Type': 'text/html' } });
    }
    return origFetch(url, opts);
  };
  window.__exampleReady = true;
  window.__parityTest = async () => {
    const before = document.querySelector('[data-testid="panel-title"]').textContent;
    document.querySelector('[data-testid="next"]').click();
    await new Promise(r => setTimeout(r, 250));
    const after = document.querySelector('[data-testid="panel-title"]').textContent;
    return { ok: before === 'Panel one' && after === 'Panel two', detail: 'jst-swap="transition" swaps via the View Transition API' };
  };
</script>
</body>
</html>
