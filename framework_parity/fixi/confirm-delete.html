<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://github.com/bigskysoftware/fixi (cfg.confirm)
  Demonstrates: a guarded DELETE.
  JST status: ✓ exact — jst-nav's `jst-confirm="…"` gates the request (htmx's
  hx-confirm); declining skips it, accepting fires the DELETE and `jst-swap="delete"`
  removes the row. (fixi-core has no confirm attribute.)
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · fixi confirm-delete</title>
<script type="module" src="../../jst-nav.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 30rem; margin: 3rem auto; }
  ul { list-style: none; padding: 0; }
  li { display: flex; align-items: center; gap: .6rem; padding: .4rem 0; border-bottom: 1px solid #eee; }
  li span.name { flex: 1; }
  button { padding: .25rem .7rem; cursor: pointer; }
</style>
</head>
<body>

<h1>Confirm before delete</h1>
<ul data-testid="list">
  <li data-testid="item-1"><span class="name">Draft proposal</span><form style="display:inline" action="/api/item/1" method="delete" jst-confirm="Delete this item?" jst-target="closest li" jst-swap="delete"><button data-testid="del-1">Delete</button></form></li>
  <li data-testid="item-2"><span class="name">Old screenshot</span><form style="display:inline" action="/api/item/2" method="delete" jst-confirm="Delete this item?" jst-target="closest li" jst-swap="delete"><button data-testid="del-2">Delete</button></form></li>
  <li data-testid="item-3"><span class="name">Temp export</span><form style="display:inline" action="/api/item/3" method="delete" jst-confirm="Delete this item?" jst-target="closest li" jst-swap="delete"><button data-testid="del-3">Delete</button></form></li>
</ul>

<script>
  const origFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = new URL(url, location.origin);
    if (/^\/api\/item\/\d+$/.test(u.pathname)) return new Response('', { status: 200 });
    return origFetch(url, opts);
  };
  window.__exampleReady = true;
  window.__parityTest = async () => {
    window.confirm = () => false;                                  // decline → no delete
    document.querySelector('[data-testid="del-1"]').click();
    await new Promise(r => setTimeout(r, 120));
    const stillThere = !!document.querySelector('[data-testid="item-1"]');
    window.confirm = () => true;                                   // accept → delete
    document.querySelector('[data-testid="del-1"]').click();
    await new Promise(r => setTimeout(r, 200));
    const gone = !document.querySelector('[data-testid="item-1"]');
    const others = !!document.querySelector('[data-testid="item-2"]');
    return { ok: stillThere && gone && others, detail: 'jst-confirm gates DELETE (decline keeps, accept removes)' };
  };
</script>
</body>
</html>
