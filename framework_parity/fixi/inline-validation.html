<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://github.com/bigskysoftware/fixi#readme  (Inline Validation)
  Demonstrates: an email field validated by the server as the user types, plus the browser's
  native constraint validation (required + type=email). In fixi the input POSTs on its default
  `change`/keystroke trigger with `fx-target` pointing at the status element it swaps.
  JST status: ✓ exact match. The input stays a plain field (so typing never loses focus to a
  re-render); on input we POST the value and a <field-status> renders the server's verdict.
  Native `required`/`type=email` gate submit alongside the server check, as the fixi demo does.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · fixi · inline-validation</title>
<script type="module" src="../../jst.js"></script>
<script src="../../framework_parity/lib/mock-fetch.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 30rem; margin: 3rem auto; }
  input { padding: .4rem; width: 100%; box-sizing: border-box; }
  input.valid { border: 2px solid #2e7d32; }
  input.invalid { border: 2px solid #c62828; }
  .msg.error { color: #c62828; }
  .msg.ok { color: #2e7d32; }
  button { padding: .5rem 1rem; margin-top: .8rem; cursor: pointer; }
</style>
</head>
<body>

<script type="jst" name="field-status" attributes="state message">
  $ if (state) {
    <div class="msg $(state === 'ok' ? 'ok' : 'error')" data-testid="msg">$(message)</div>
  $ }
</script>

<h1>Inline Validation</h1>
<form id="form">
  <label>Email
    <input type="email" id="email" name="email" data-testid="email" placeholder="test@example.com" autocomplete="off" required>
  </label>
  <field-status id="status"></field-status>
  <button type="submit" id="submit" data-testid="submit" disabled>Submit</button>
</form>
<div id="result" data-testid="result"></div>

<script>
  const taken = ['joe@example.com', 'angie@example.com'];
  JSTMock.route('POST /api/validate-email', req => {
    const email = (req.form.email || '').trim();
    const valid = /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email);
    if (!valid) return { json: { state: 'error', message: 'That is not a valid email.', ok: false } };
    if (taken.includes(email.toLowerCase())) return { json: { state: 'error', message: 'That email is already taken.', ok: false } };
    return { json: { state: 'ok', message: 'That email is available.', ok: true } };
  }, { delay: 80 });

  const email = document.getElementById('email');
  const status = document.getElementById('status');
  const submit = document.getElementById('submit');

  email.addEventListener('input', async () => {
    if (!email.value) { status.state = ''; submit.disabled = true; email.className = ''; return; }
    const data = await (await fetch('/api/validate-email', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email.value }),
    })).json();
    status.state = data.state;
    status.message = data.message;
    // Server verdict AND native validity both gate the button.
    submit.disabled = !(data.ok && email.checkValidity());
    email.className = data.ok ? 'valid' : 'invalid';
  });

  document.getElementById('form').addEventListener('submit', e => {
    e.preventDefault();
    document.getElementById('result').textContent = `Registered ${email.value}!`;
  });

  window.__exampleReady = true;
</script>
</body>
</html>
