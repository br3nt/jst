<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://github.com/bigskysoftware/fixi#readme  (Intersection Events extension)
  Demonstrates: as the last row scrolls into view, the next page is fetched and appended.
  JST status: (i) partial. The fetch + append into a page-owned array is idiomatic JST
  (identical to click-to-load). The GAP is the trigger: fixi-core has no reveal/intersect
  trigger either — its README ships an "Intersection Events" EXTENSION for exactly this.
  So the hand-wired IntersectionObserver on a sentinel (re-observed after each render) is the
  same plumbing a fixi user writes. This is parity with fixi-core, not a JST deficiency.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · fixi · infinite-scroll</title>
<script type="module" src="../../jst.js"></script>
<script src="../../framework_parity/lib/mock-fetch.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: .5rem .6rem; border-bottom: 1px solid #eee; }
  .sentinel { height: 1px; }
  .loading { text-align: center; color: #888; padding: .5rem; }
</style>
</head>
<body>

<script type="jst" name="scroll-list" attributes="rows more">
  <table><tbody data-testid="rows">
    $ (rows || []).forEach(r => {
      <tr data-testid="row-$(r.id)"><td>$(r.id)</td><td>$(r.name)</td><td>$(r.email)</td></tr>
    $ })
  </tbody></table>
  $ if (more) {
    <div class="loading" data-testid="loading">Loading more…</div>
    <div class="sentinel" id="sentinel"></div>
  $ }
</script>

<h1>Infinite Scroll</h1>
<scroll-list id="list"></scroll-list>

<script>
  const PER = 20, TOTAL = 100;
  JSTMock.route('GET /api/feed', req => {
    const page = Number(req.query.page || 1);
    const start = (page - 1) * PER;
    const rows = [];
    for (let i = start; i < Math.min(start + PER, TOTAL); i++) rows.push({ id: i + 1, name: `Agent ${i + 1}`, email: `agent${i + 1}@matrix.net` });
    return { json: { rows, more: start + PER < TOTAL } };
  }, { delay: 100 });

  const list = document.getElementById('list');
  let rows = [], page = 1, loading = false;
  list.rows = rows; list.more = true;

  async function loadNext() {
    if (loading) return;
    loading = true;
    const data = await (await fetch(`/api/feed?page=${page++}`)).json();
    rows = rows.concat(data.rows);
    list.rows = rows; list.more = data.more;
    loading = false;
    queueMicrotask(observeSentinel); // re-attach IO after re-render (the fixi-extension equivalent)
  }

  const io = new IntersectionObserver(entries => {
    if (entries.some(e => e.isIntersecting)) loadNext();
  }, { rootMargin: '200px' });

  function observeSentinel() {
    const s = list.querySelector('#sentinel');
    if (s) io.observe(s);
  }

  window.__parityTest = async () => {
    const initial = document.querySelectorAll('[data-testid="rows"] tr').length;
    loadNext(); // simulate the sentinel revealing the next page
    for (let i = 0; i < 20 && document.querySelectorAll('[data-testid="rows"] tr').length <= initial; i++) {
      await new Promise(r => setTimeout(r, 100));
    }
    return { ok: document.querySelectorAll('[data-testid="rows"] tr').length > initial, detail: 'sentinel reveal appends next page' };
  };

  loadNext().then(() => { observeSentinel(); window.__exampleReady = true; });
</script>
</body>
</html>
