<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://github.com/bigskysoftware/fixi (fx:before / fx:after)
  Demonstrates: an in-flight request indicator.
  JST status: ✓ exact - jst-nav adds a `jst-request` class to the triggering
  element while the request is in flight (htmx's hx-indicator), so a CSS-only
  spinner shows during the fetch and clears after. No lifecycle handler.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · fixi request-indicator</title>
<script type="module" src="../../jst-nav.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 30rem; margin: 3rem auto; }
  button { padding: .5rem 1rem; cursor: pointer; }
  .spinner { display: none; width: 1rem; height: 1rem; margin-left: .5rem;
             border: 2px solid #bbb; border-top-color: #3f51b5; border-radius: 50%;
             vertical-align: middle; animation: spin .6s linear infinite; }
  .jst-request .spinner { display: inline-block; }
  .jst-request { opacity: .6; pointer-events: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { margin-top: 1rem; padding: .6rem .8rem; background: #f1f3f9; border-radius: 6px; }
</style>
</head>
<body>

<h1>Request indicator</h1>
<a role="button" data-testid="btn" href="/api/report" jst-target="#result" jst-swap="innerHTML">
  Load report <span class="spinner" data-testid="spinner" aria-label="loading"></span>
</a>
<div id="result"></div>

<script>
  const origFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = new URL(url, location.origin);
    if (u.pathname === '/api/report') {
      await new Promise(r => setTimeout(r, 250));
      return new Response('<p class="result" data-testid="result">Report ready: 1,284 rows processed.</p>', { headers: { 'Content-Type': 'text/html' } });
    }
    return origFetch(url, opts);
  };
  window.__exampleReady = true;
  window.__parityTest = async () => {
    const btn = document.querySelector('[data-testid="btn"]');
    btn.click();
    await new Promise(r => setTimeout(r, 60));
    const busy = btn.classList.contains('jst-request');           // spinner shown via the class
    await new Promise(r => setTimeout(r, 400));
    const done = !!document.querySelector('[data-testid="result"]') && !btn.classList.contains('jst-request');
    return { ok: busy && done, detail: 'jst-request shows the indicator in flight, cleared after' };
  };
</script>
</body>
</html>
