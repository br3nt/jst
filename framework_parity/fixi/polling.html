<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://github.com/bigskysoftware/fixi (polling is an extension)
  Demonstrates: a region that refreshes itself on an interval.
  JST status: ✓ exact — polling is setInterval + jst-nav's swap() primitive; the region
  declaratively (fixi-core has no polling trigger); removing the element stops it.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · fixi polling</title>
<script type="module" src="../../jst-nav.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 28rem; margin: 3rem auto; }
  #clock { font-size: 2rem; font-variant-numeric: tabular-nums; }
  button { padding: .4rem 1rem; cursor: pointer; }
</style>
</head>
<body>

<h1>Live region (polling)</h1>
<div id="clock" data-testid="clock">—</div>
<button id="stop" data-testid="stop">Stop</button>

<script>
  let tick = 0;
  const origFetch = window.fetch.bind(window);
  window.fetch = async (url, opts) => {
    const u = new URL(url, location.origin);
    if (u.pathname === '/api/tick') { tick++; return new Response(String(100 + tick), { headers: { 'Content-Type': 'text/html' } }); }
    return origFetch(url, opts);
  };
  // Polling is plain platform code: an interval calling jst-nav's swap().
  const poll = setInterval(() => JST.nav.swap('#clock', '/api/tick'), 500);
  document.getElementById('stop').addEventListener('click', () => clearInterval(poll));
  window.__exampleReady = true;
  window.__parityTest = async () => {
    await window.JST.nav.swap('#clock', '/api/tick');
    await new Promise(r => setTimeout(r, 150));
    const after = document.querySelector('[data-testid="clock"]').textContent.trim();
    return { ok: /^\d+$/.test(after) && Number(after) > 100, detail: `setInterval + swap() refreshed the region to ${after}` };
  };
</script>
</body>
</html>
