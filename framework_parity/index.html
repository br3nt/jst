<!DOCTYPE html>
<!--
  Browsable hub for the framework-parity study. Itself built in JST (dogfood):
  a <parity-hub> component renders the sidebar + viewer from examples.json.
  Serve the repo root and open /framework_parity/index.html.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JST framework-parity — examples</title>
<script type="module" src="../jst.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; color: #1c2030; height: 100vh; overflow: hidden; }
  parity-hub { display: block; height: 100vh; }
  .layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }

  .sidebar { border-right: 1px solid #e3e6ef; background: #f7f8fc; display: flex; flex-direction: column; min-height: 0; }
  .sidebar-head { padding: 14px 16px 10px; border-bottom: 1px solid #e3e6ef; }
  .sidebar-head h1 { font-size: 1rem; margin: 0 0 4px; color: #3a4256; }
  .sidebar-head .tally { font-size: .78rem; color: #8a90a2; }
  .filter { width: 100%; padding: 8px 10px; border: 1px solid #d6dae6; border-radius: 7px; font: inherit; margin-top: 8px; }
  .status-filters { display: flex; gap: 6px; margin-top: 8px; }
  .status-filters button { flex: 1; padding: 5px; border: 1px solid #d6dae6; background: #fff; border-radius: 6px; cursor: pointer; font-size: .78rem; }
  .status-filters button.active { background: #3f51b5; color: #fff; border-color: #3f51b5; }

  .list { overflow-y: auto; flex: 1; padding: 6px 0 40px; }
  .group-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: #9aa0b2; padding: 12px 16px 4px; position: sticky; top: 0; background: #f7f8fc; }
  .item { display: flex; align-items: center; gap: 8px; padding: 6px 16px; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font: inherit; color: #2a3040; }
  .item:hover { background: #eceefb; }
  .item.active { background: #e2e6fb; font-weight: 600; }
  .item .name { flex: 1; font-size: .85rem; }
  .badge { font-size: .72rem; width: 20px; text-align: center; flex: none; }
  .badge.exact { color: #1f9d57; }
  .badge.partial { color: #c87f12; }
  .badge.none { color: #c0392b; }

  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar { border-bottom: 1px solid #e3e6ef; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
  .topbar .title { font-weight: 600; }
  .topbar .note { font-size: .8rem; color: #71778a; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar a, .topbar button { font-size: .8rem; }
  .topbar .pill { padding: 2px 8px; border-radius: 999px; font-size: .72rem; }
  .pill.exact { background: #e3f6ec; color: #1f9d57; }
  .pill.partial { background: #fdf1dd; color: #c87f12; }
  .pill.none { background: #fae3df; color: #c0392b; }
  .nav-btn { padding: 4px 10px; border: 1px solid #d6dae6; background: #fff; border-radius: 6px; cursor: pointer; }
  .nav-btn[disabled] { opacity: .4; cursor: default; }
  .src { color: #3f51b5; text-decoration: none; }
  .src:hover { text-decoration: underline; }
  iframe { flex: 1; width: 100%; border: 0; background: #fff; }
  .placeholder { flex: 1; display: grid; place-items: center; color: #9aa0b2; }
</style>
</head>
<body>

<script type="jst" name="parity-hub" items current query status>
  $ const all = items || [];
  $ const q = (query || '').toLowerCase();
  $ const sf = status || 'all';
  $ const shown = all.filter(it => (sf === 'all' || it.status === sf) && (!q || (it.framework + ' ' + it.name).toLowerCase().includes(q)));
  $ const frameworks = ['HTMX', 'Alpine.js', 'Vue', 'React'];
  $ const cur = all.find(it => it.file === current) || shown[0] || all[0];
  $ const idx = shown.findIndex(it => it.file === (cur && cur.file));
  $ const prev = idx > 0 ? shown[idx - 1] : null;
  $ const next = idx >= 0 && idx < shown.length - 1 ? shown[idx + 1] : null;
  $ const badge = s => s === 'exact' ? '✓' : s === 'none' ? '✗' : 'i';
  $ const count = (fw, s) => all.filter(it => it.framework === fw && it.status === s).length;
  $ window.__nav = { prev: prev && prev.file, next: next && next.file };

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <h1>JST parity — examples</h1>
        <div class="tally">$(all.filter(i => i.status==='exact').length) exact · $(all.filter(i => i.status==='partial').length) partial · $(all.length) total</div>
        <input class="filter" placeholder="Filter examples…" @input="$(e => el.query = e.target.value)">
        <div class="status-filters">
          <button class="$(sf==='all'?'active':'')" @click="$(() => el.status = 'all')">All</button>
          <button class="$(sf==='exact'?'active':'')" @click="$(() => el.status = 'exact')">✓</button>
          <button class="$(sf==='partial'?'active':'')" @click="$(() => el.status = 'partial')">(i)</button>
        </div>
      </div>
      <div class="list">
        $ frameworks.forEach(fw => {
          $ const group = shown.filter(it => it.framework === fw);
          $ if (group.length) {
            <div class="group-title">$(fw) — $(count(fw,'exact'))✓ $(count(fw,'partial'))i</div>
            $ group.forEach(it => {
              <button class="item $(cur && it.file===cur.file ? 'active' : '')" @click="$(() => el.emit('go', it.file))">
                <span class="badge $(it.status)">$(badge(it.status))</span>
                <span class="name">$(it.name)</span>
              </button>
            $ })
          $ }
        $ })
      </div>
    </aside>

    <section class="main">
      $ if (cur) {
        <div class="topbar">
          <span class="pill $(cur.status)">$(badge(cur.status))</span>
          <span class="title">$(cur.framework): $(cur.name)</span>
          <span class="note" title="$(cur.note)">$(cur.note)</span>
          <a class="src" href="$(cur.source)" target="_blank" rel="noopener">source ↗</a>
          <a class="src" href="../framework_parity/$(cur.file)" target="_blank" rel="noopener">open ↗</a>
          <button class="nav-btn" $(prev ? '' : 'disabled') @click="$(() => prev && el.emit('go', prev.file))">‹ prev</button>
          <button class="nav-btn" $(next ? '' : 'disabled') @click="$(() => next && el.emit('go', next.file))">next ›</button>
        </div>
        <iframe src="../framework_parity/$(cur.file)" title="$(cur.name)"></iframe>
      $ } else {
        <div class="placeholder">No examples match the filter.</div>
      $ }
    </section>
  </div>
</script>

<parity-hub id="hub" status="all"></parity-hub>

<script>
  const hub = document.getElementById('hub');

  fetch('../framework_parity/examples.json')
    .then(r => r.json())
    .then(items => {
      hub.items = items;
      applyHash();
    });

  // Hash routing: #htmx/click-to-edit.html  → linkable, shareable, back/forward.
  function applyHash() {
    const file = decodeURIComponent(location.hash.slice(1));
    if (file) hub.current = file;
  }
  window.addEventListener('hashchange', applyHash);

  // Sidebar / prev / next clicks set the hash (single source of truth).
  hub.addEventListener('go', e => { location.hash = e.detail; });

  // Keyboard nav: ← / → (or j / k) move between visible examples.
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const nav = window.__nav || {};
    if ((e.key === 'ArrowLeft' || e.key === 'k') && nav.prev) location.hash = nav.prev;
    if ((e.key === 'ArrowRight' || e.key === 'j') && nav.next) location.hash = nav.next;
  });
</script>
</body>
</html>
