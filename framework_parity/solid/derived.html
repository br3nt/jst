<html lang="en"><head><meta charset="UTF-8"><title>JST · Solid derived</title>
<script type="module" src="../../jst.js"></script>
<style>body{font-family:system-ui,sans-serif;max-width:420px;margin:3rem auto}button{cursor:pointer;padding:8px 16px}</style>
</head><body>
<h1>Derived signals</h1>
<script type="jst" name="so-doubler" attributes="count">
  $ const doubled = (count || 0) * 2;
  <button onclick="$(() => el.count = (el.count || 0) + 1)">Count: $(count || 0)</button>
  <p data-testid="out">Doubled: $(doubled)</p>
</script>
<so-doubler data-testid="counter" count="0"></so-doubler>
<script>
window.__exampleReady = true;
window.__parityTest = async () => { const b=document.querySelector('so-doubler button'); b.click(); b.click(); await new Promise(r=>setTimeout(r,0)); return { ok: document.querySelector('[data-testid=out]').textContent.includes('Doubled: 4'), detail: 'memo tracks source signal' }; };
</script>
</body></html>
