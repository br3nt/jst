<html lang="en"><head><meta charset="UTF-8"><title>JST · Solid For</title>
<script type="module" src="../../jst.js"></script>
<style>body{font-family:system-ui,sans-serif;max-width:420px;margin:3rem auto}</style>
</head><body>
<h1>For</h1>
<script type="jst" name="so-list" attributes="cats">
  <ul>
    $ (cats || []).forEach(c => {
      <li jst-key="$(c.id)">$(c.name)</li>
    $ })
  </ul>
</script>
<so-list data-testid="out" id="list"></so-list>
<script>
  document.getElementById('list').cats = [{id:1,name:'J Cole'},{id:2,name:'Tinted Eyes'},{id:3,name:'Babbage'}];
  window.__exampleReady = true;
</script>
</body></html>
