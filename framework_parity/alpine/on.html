<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/on
  Demonstrates: Alpine x-on / @ — event listeners, plus key modifiers
  (@keydown.enter) and event modifiers (.prevent).
  JST status: ✓ exact — handlers are plain function bodies (the native inline
  contract): @keydown.enter.prevent → onkeydown="keys(event, { Enter: … })" with
  event.preventDefault() in the body; @submit.prevent → onsubmit="event.preventDefault()".
  No modifier grammar to learn — it's just JS statements.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-on</title>
<script type="module" src="../../jst.js"></script>
<style> body { font-family: system-ui, sans-serif; margin: 3rem; } input { padding: .4rem; } li { margin: .2rem 0; } </style>
</head>
<body>

<script type="jst" name="x-on-demo" attributes="items draft">
  $ const list = items || [];
  <form onsubmit="event.preventDefault();">
    <input data-testid="field" placeholder="Add item, press Enter"
           jst-model="draft"
           onkeydown="keys(event, { Enter: () => {
             event.preventDefault();
             const v = (el.draft || '').trim();
             if (v) { el.items = [...list, v]; el.draft = ''; }
           } })">
    <button type="button" data-testid="clear" onclick="el.items = []">Clear</button>
  </form>
  <ul data-testid="list">
    $ list.forEach(i => {
      <li jst-key="$(i)">$(i)</li>
    $ })
  </ul>
</script>

<h1>x-on (events + key modifiers)</h1>
<x-on-demo id="demo"></x-on-demo>

<script>
  document.getElementById('demo').items = ['first'];
  window.__exampleReady = true;
</script>
</body>
</html>
