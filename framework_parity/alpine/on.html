<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/on
  Demonstrates: Alpine x-on / @ — event listeners, plus key modifiers
  (@keydown.enter) and event modifiers (.prevent).
  JST status: (i) partial — `@event="$(fn)"` covers listeners exactly, but JST
  has NO modifier sugar (.enter/.prevent/.stop). You re-implement them by hand:
  check `e.key === 'Enter'` and call `e.preventDefault()` inside the handler.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-on</title>
<script type="module" src="../../jst.js"></script>
<style> body { font-family: system-ui, sans-serif; margin: 3rem; } input { padding: .4rem; } li { margin: .2rem 0; } </style>
</head>
<body>

<script type="jst" name="x-on-demo" items draft>
  $ const list = items || [];
  <form @submit="$(e => { e.preventDefault(); /* .prevent done manually */ })">
    <input data-testid="field" placeholder="Add item, press Enter"
           .value="$(draft || '')"
           @input="$(e => el.draft = e.target.value)"
           @keydown="$(e => {
             /* @keydown.enter implemented manually — JST has no key modifiers */
             if (e.key === 'Enter') {
               e.preventDefault();
               const v = (el.draft || '').trim();
               if (v) { el.items = [...list, v]; el.draft = ''; }
             }
           })">
    <button type="button" data-testid="clear" @click="$(() => el.items = [])">Clear</button>
  </form>
  <ul data-testid="list">
    $ list.forEach(i => {
      <li>$(i)</li>
    $ })
  </ul>
</script>

<h1>x-on (events + key modifiers)</h1>
<x-on-demo id="demo"></x-on-demo>

<script>
  document.getElementById('demo').items = ['first'];
  window.__exampleReady = true;
</script>
</body>
</html>
