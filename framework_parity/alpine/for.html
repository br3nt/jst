<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/for
  Demonstrates: Alpine x-for — render a list, with add/remove, index access.
  JST status: ✓ exact for rendering — `$ items.forEach((item, i) => { ... })`
  plus `jst-key` when identity matters.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-for</title>
<script type="module" src="../../jst.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 3rem; }
  li { display: flex; gap: .6rem; align-items: center; margin: .25rem 0; }
  button.del { color: #c00; border: none; background: none; cursor: pointer; }
</style>
</head>
<body>

<script type="jst" name="x-for-demo" props="items">
  $ const list = items || [];
  <div>
    <button data-testid="add" @click="$(() => el.items = [...list, 'Item ' + (list.length + 1)])">Add</button>
    <ol data-testid="list">
      $ list.forEach((item, i) => {
        <li jst-key="$(item)">
          <span>$(i + 1). $(item)</span>
          <button class="del" @click="$(() => el.items = list.filter((_, j) => j !== i))">×</button>
        </li>
      $ })
      $ if (list.length === 0) {
        <li><em>empty</em></li>
      $ }
    </ol>
  </div>
</script>

<h1>x-for</h1>
<x-for-demo id="demo"></x-for-demo>

<script>
  document.getElementById('demo').items = ['Apple', 'Banana', 'Cherry'];
  window.__exampleReady = true;
</script>
</body>
</html>
