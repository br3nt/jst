<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/init
  Demonstrates: Alpine x-init — run setup code once when the component initialises
  (here: populate a message after mount, as you would to kick off a fetch).
  JST status: ✓ exact — `once()` runs setup once after the rendered DOM commits.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-init</title>
<script type="module" src="../../jst.js"></script>
<style> body { font-family: system-ui, sans-serif; margin: 3rem; } </style>
</head>
<body>

<script type="jst" name="x-init-demo" attributes="message">
  $ once('init', () => { el.message = 'Initialised once after mount'; });
  <p data-testid="out">$(message || 'waiting for init…')</p>
</script>

<h1>x-init</h1>
<x-init-demo id="demo"></x-init-demo>

<script>
  window.__parityTest = async () => {
    await new Promise(resolve => setTimeout(resolve, 0));
    return { ok: document.querySelector('[data-testid="out"]').textContent.includes('Initialised once'), detail: 'once() ran after mount' };
  };
  window.__exampleReady = true;
</script>
</body>
</html>
