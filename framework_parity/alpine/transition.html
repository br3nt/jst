<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/transition
  Demonstrates: Alpine x-transition — animate an element entering/leaving.
  JST status: ✓ exact — `jst-transition` coordinates enter/leave classes and
  CSS owns the animation.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-transition</title>
<script type="module" src="../../jst.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 3rem; }
  .box {
    margin-top: 1rem; padding: 1.5rem; background: #3f51b5; color: white; border-radius: 8px;
  }
  .fade-enter-active, .fade-leave-active {
    transition: opacity .4s ease, transform .4s ease;
  }
  .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(-10px) scale(.97); }
  .fade-enter-to, .fade-leave-from { opacity: 1; transform: none; }
</style>
</head>
<body>

<script type="jst" name="x-transition-demo" attributes="open">
  <div>
    <button data-testid="toggle" onclick="$(() => el.open = !el.open)">$(open ? 'Leave' : 'Enter')</button>
    $ if (open) {
      <div class="box" jst-transition="fade" data-testid="box">I fade + slide using CSS transition classes.</div>
    $ }
  </div>
</script>

<h1>x-transition (CSS substitute)</h1>
<x-transition-demo id="demo" open="true"></x-transition-demo>

<script>
  window.__exampleReady = true;
</script>
</body>
</html>
