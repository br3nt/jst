<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/teleport
  Demonstrates: Alpine x-teleport — author a modal next to its trigger but have it
  RENDER at the end of <body> (escaping clipping/stacking ancestors).
  JST status: (i) partial — JST has no teleport. A component only renders into its
  own light DOM, so you cannot co-locate the modal markup with its trigger and
  have it pop out. Workaround: keep the trigger in the component but hoist the
  modal to a body-level mount yourself, driven by events (props-down/events-up).
  Same end result; you lose the co-location ergonomics teleport exists for.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-teleport</title>
<script type="module" src="../../jst.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 3rem; }
  /* a clipping ancestor that would trap a non-teleported modal */
  .clipped { overflow: hidden; height: 80px; border: 2px dashed #c00; padding: 1rem; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; }
  .modal { background: white; padding: 2rem; border-radius: 10px; }
</style>
</head>
<body>

<!-- trigger lives inside a clipped box; modal must escape it -->
<script type="jst" name="teleport-trigger">
  <div>
    <button data-testid="open" @click="$(() => el.emit('open'))">Open modal (teleported to body)</button>
  </div>
</script>

<!-- the modal is its OWN component, mounted at body level (the manual "teleport target") -->
<script type="jst" name="teleport-modal" props="open">
  $ if (open) {
    <div class="overlay" data-testid="overlay" @click="$(e => { if (e.target === e.currentTarget) el.emit('close'); })">
      <div class="modal">
        <p>I rendered at the end of &lt;body&gt;, not inside the clipped box.</p>
        <button data-testid="close" @click="$(() => el.emit('close'))">Close</button>
      </div>
    </div>
  $ }
</script>

<h1>x-teleport</h1>
<div class="clipped">
  Clipped region (overflow:hidden).
  <teleport-trigger id="trigger"></teleport-trigger>
</div>

<!-- manual teleport destination -->
<teleport-modal id="modal" open="false"></teleport-modal>

<script>
  const modal = document.getElementById('modal');
  document.getElementById('trigger').addEventListener('open', () => { modal.open = true; });
  modal.addEventListener('close', () => { modal.open = false; });
  window.__exampleReady = true;
</script>
</body>
</html>
