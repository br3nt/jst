<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/teleport
  Demonstrates: Alpine x-teleport - author a modal next to its trigger but have it
  RENDER at the end of <body> (escaping clipping/stacking ancestors).
  JST status: ✓ exact - jst-behaviors' `jst-teleport="body"` hoists the modal to
  <body> on connect, so it can be co-located with its trigger inside a clipped box
  yet still escape it. (A native <dialog> handles the top-layer modal itself.)
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-teleport</title>
<script type="module" src="../../jst-behaviors.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 3rem; }
  .clipped { overflow: hidden; height: 80px; border: 2px dashed #c00; padding: 1rem; }
  dialog.modal { padding: 2rem; border-radius: 10px; border: none; }
  dialog.modal::backdrop { background: rgba(0,0,0,.5); }
</style>
</head>
<body>

<h1>x-teleport</h1>
<div class="clipped" id="clip">
  Clipped region (overflow:hidden).
  <button data-testid="open">Open modal (teleported to body)</button>
  <!-- authored here, but jst-teleport hoists it to <body> so it escapes the clip -->
  <dialog class="modal" id="m" data-testid="overlay" jst-teleport="body">
    <p>I render at the end of &lt;body&gt;, not inside the clipped box.</p>
    <button data-testid="close">Close</button>
  </dialog>
</div>

<script>
  document.querySelector('[data-testid="open"]').addEventListener('click', () => document.getElementById('m').showModal());
  document.querySelector('[data-testid="close"]').addEventListener('click', () => document.getElementById('m').close());
  window.__exampleReady = true;
  window.__parityTest = async () => {
    const dialog = document.getElementById('m');
    const teleported = dialog.parentElement === document.body && !document.getElementById('clip').contains(dialog);
    document.querySelector('[data-testid="open"]').click();
    await new Promise(r => setTimeout(r, 50));
    const open = dialog.open === true;
    return { ok: teleported && open, detail: 'modal authored in the clipped box, teleported to <body>, opens clear of the clip' };
  };
</script>
</body>
</html>
