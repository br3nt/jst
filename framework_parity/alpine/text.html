<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/text
  Demonstrates: Alpine x-text — set an element's text content from an expression.
  JST status: ✓ exact — `$(expr)` interpolates text content and is HTML-escaped
  by default, matching x-text's safe textContent assignment.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-text</title>
<script type="module" src="../../jst.js"></script>
<style> body { font-family: system-ui, sans-serif; margin: 3rem; } input { padding: .4rem; } </style>
</head>
<body>

<script type="jst" name="x-text-demo">
  <div>
    <input data-testid="field" placeholder="Type your name"
           .value="$(name || '')"
           oninput="$(e => el.name = e.target.value)">
    <!-- x-text equivalent: text content comes from the expression, escaped -->
    <p>Hello, <strong data-testid="out">$(name || 'stranger')</strong>!</p>
  </div>
</script>

<h1>x-text</h1>
<x-text-demo id="demo" name=""></x-text-demo>

<script>
  window.__exampleReady = true;
</script>
</body>
</html>
