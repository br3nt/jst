<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/bind
  Demonstrates: Alpine x-bind / :class and :attribute - bind class lists and
  arbitrary attributes (disabled, aria-pressed, href) to expressions.
  JST status: ✓ exact - interpolation works inside attribute values
  (class="$(...)", disabled="$(...)"), covering x-bind's class & attribute use.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-bind</title>
<script type="module" src="../../jst.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 3rem; }
  .pill { padding: .4rem 1rem; border-radius: 999px; border: 1px solid #888; cursor: pointer; }
  .pill.active { background: #3f51b5; color: white; border-color: #3f51b5; }
  button[disabled] { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>

<script type="jst" name="x-bind-demo" attributes="on">
  <div>
    <!-- :class - class string driven by state -->
    <span class="pill $(on ? 'active' : '')" data-testid="pill"
          aria-pressed="$(on ? 'true' : 'false')"
          onclick="el.on = !el.on">Toggle me</span>

    <!-- :attribute - bind disabled -->
    <button data-testid="btn" $(on ? '' : 'disabled') onclick="alert('clicked')">
      Enabled only when toggled on
    </button>
  </div>
</script>

<h1>x-bind (class & attributes)</h1>
<x-bind-demo id="demo" on="false"></x-bind-demo>

<script>
  window.__exampleReady = true;
</script>
</body>
</html>
