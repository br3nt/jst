<!DOCTYPE html>
<!-- JST - JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/model
  Demonstrates: Alpine x-model - two-way binding for text input, checkbox and
  select, with a live preview of the bound values.
  JST status: ✓ exact - `jst-model` is the local form shorthand: it reads from
  a declared prop and updates `el.prop` when the user edits the control.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-model</title>
<script type="module" src="../../jst.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 3rem; }
  label { display: block; margin: .6rem 0; }
  pre { background: #f4f4f8; padding: 1rem; border-radius: 8px; }
</style>
</head>
<body>

<script type="jst" name="x-model-demo" attributes="text agree color">
  <div>
    <label>Text:
      <input data-testid="text" type="text" jst-model="text">
    </label>
    <label>Agree:
      <input data-testid="checkbox" type="checkbox" jst-model="agree">
    </label>
    <label>Color:
      <select data-testid="select" jst-model="color">
        <option value="red">Red</option>
        <option value="green">Green</option>
        <option value="blue">Blue</option>
      </select>
    </label>
    <pre data-testid="out">text: $(text || '')
agree: $(agree ? 'yes' : 'no')
color: $(color || 'red')</pre>
  </div>
</script>

<h1>x-model (two-way: text, checkbox, select)</h1>
<x-model-demo id="demo" text="" agree="false" color="green"></x-model-demo>

<script>
  window.__exampleReady = true;
</script>
</body>
</html>
