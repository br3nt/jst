<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://alpinejs.dev/directives/data
  Demonstrates: Alpine x-data — a component scope holding reactive local state,
  here the canonical counter (count + increment/decrement buttons).
  JST status: ✓ exact — a JST component's params ARE its reactive scope; a
  component updates its own state with `el.count = ...`, re-rendering itself.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-data + counter</title>
<script type="module" src="../../jst.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 3rem; }
  .counter { display: flex; gap: 1rem; align-items: center; font-size: 1.4rem; }
  button { font-size: 1.2rem; width: 2.4rem; height: 2.4rem; cursor: pointer; }
</style>
</head>
<body>

<!-- count is the component's local reactive state (Alpine's x-data="{ count: 0 }") -->
<script type="jst" name="x-counter" count>
  <div class="counter">
    <button data-testid="dec" @click="$(() => el.count = count - 1)">−</button>
    <span data-testid="value">$(count)</span>
    <button data-testid="inc" @click="$(() => el.count = count + 1)">+</button>
  </div>
</script>

<h1>Counter</h1>
<x-counter id="counter" count="0"></x-counter>

<script>
  window.__exampleReady = true;
</script>
</body>
</html>
