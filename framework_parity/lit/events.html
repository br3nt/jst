<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<!--
  Source: https://lit.dev/docs/components/events/
  Demonstrates: a declarative event listener. Lit binds `@click=${this._handleClick}`
  in the template; the handler mutates a reactive property and the component re-renders.
  Maps from: Lit `@click=${fn}` ↔ JST `onclick="$(fn)"` (adds an event listener);
  local state is a JST prop the handler reassigns.
  JST status: ✓ exact — `onclick="$(() => el.count = ...)"` is the same declarative bind.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JST · Lit events</title>
<script type="module" src="../../jst.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 420px; margin: 3rem auto; }
  button { font-size: 1.1rem; padding: 10px 18px; cursor: pointer; }
</style>
</head>
<body>
<h1>Events</h1>

<!-- onclick bound declaratively; the handler bumps the component's own count prop. -->
<script type="jst" name="click-counter" props="count">
  <button id="inc" data-testid="inc" onclick="$(() => el.count = (el.count || 0) + 1)">
    Click count: $(count || 0)
  </button>
</script>

<click-counter id="counter" count="0"></click-counter>

<script>
  window.__parityTest = async () => {
    const btn = document.querySelector('[data-testid="inc"]');
    btn.click();
    btn.click();
    btn.click();
    await new Promise(r => setTimeout(r, 0));
    return {
      ok: btn.textContent.includes('Click count: 3'),
      detail: 'onclick handler incremented to 3',
    };
  };
  window.__exampleReady = true;
</script>
</body>
</html>
