name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      # Required gate: the pure-Node suites (runtime + adversarial scanner
      # regression). No browser, no network, no build step.
      - name: Node tests
        run: npm run test:runtime

      # --- Browser-backed suites --------------------------------------------
      # run_browser_tests.mjs, run_example_smoke.mjs, framework_parity/verify.mjs
      # and agentic_feed/run_feed_smoke.mjs honor CHROME_PATH, defaulting to the
      # macOS path for local dev. On CI we install Chrome and point CHROME_PATH at
      # it, so these are a real gate (no continue-on-error).
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: stable

      - name: Browser tests
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:browser

      - name: Example smoke tests
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:examples

      - name: Framework parity
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:parity

      - name: Agentic feed smoke
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:agentic

      # --- VS Code tooling --------------------------------------------------
      # The tooling package has its own deps (vscode-oniguruma / vscode-textmate
      # for the grammar test), so install them from its lockfile before testing.
      - name: Install tooling deps
        run: npm ci --prefix tooling/vscode-jst

      - name: Tooling tests
        run: npm run test:vscode
