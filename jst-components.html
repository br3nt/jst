<!--
  jst-components.html - the JST component definitions that pair with
  jst-components.css (which pairs with jst-layout.css). One fragment, five
  components: <jst-palette> <jst-tabs> <jst-toaster> <jst-combobox> <jst-table>.

  Consume it either way:

  Runtime (dev, or trusted-fragment prod):
    <script type="module" src="/jst.js"></script>
    <script type="module" src="/jst-behaviors.js"></script>
    <jst-include src="/jst-components.html"></jst-include>
    The definitions auto-register on arrival; usage elements upgrade, and
    properties set before the upgrade are preserved.

  Precompiled (strict CSP):
    node tools/precompile.mjs jst-components.html --out dist/jst-components.js --runtime /jst.runtime.js
    <script type="module" src="/dist/jst-components.js"></script>

  These templates are trusted application code: serve the fragment from your
  own origin, like any script.
-->
<script type="jst" name="jst-palette" attributes="actions open query active">
  $ const q = (query || '').toLowerCase();
  $ const items = (actions || []).filter(a => !q || a.label.toLowerCase().includes(q));
  $ const idx = Math.max(0, Math.min(active || 0, Math.max(items.length - 1, 0)));
  $ const run = (c) => { el.open = false; el.query = ''; el.active = 0; el.emit('run', c.id); };
  $ const onKey = (e) => keys(e, {
  $   ArrowDown: () => { e.preventDefault(); el.active = Math.min(idx + 1, items.length - 1); },
  $   ArrowUp:   () => { e.preventDefault(); el.active = Math.max(idx - 1, 0); },
  $   Enter:     () => items[idx] && run(items[idx]),
  $   Escape:    () => { el.open = false; },
  $ });
  $ if (open) {
  $   queueMicrotask(() => { const i = el.querySelector('input'); if (i && document.activeElement !== i) i.focus(); });
    <div class="jst-palette-overlay" onclick="if (event.target === this) el.open = false">
      <div class="jst-palette" role="dialog" aria-label="Command palette">
        <input placeholder="Type a command…" role="combobox" aria-expanded="true"
               .value="$(query || '')"
               oninput="el.query = event.target.value; el.active = 0"
               onkeydown="onKey(event)">
        <ul role="listbox">
          $ items.forEach((c, i) => {
            <li role="option" jst-key="$(c.id)" aria-selected="$(i === idx)" data-active="$(i === idx)"
                onclick="run(c)" onmousemove="el.active = i">
              <span>$(c.label)</span>
              $ if (c.kbd) {
                <kbd>$(c.kbd)</kbd>
              $ }
            </li>
          $ })
          $ if (!items.length) {
            <li class="jst-empty-line">No matching commands</li>
          $ }
        </ul>
      </div>
    </div>
  $ }
</script>

<script type="jst" name="jst-tabs" attributes="tabs active">
  $ const items = tabs || [];
  $ const idx = Math.max(0, Math.min(active || 0, items.length - 1));
  $ const onKey = (e) => {
  $   if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
  $   e.preventDefault();
  $   const dir = e.key === 'ArrowRight' ? 1 : -1;
  $   const cur = Math.max(0, Math.min(el.active || 0, items.length - 1));
  $   const next = (cur + dir + items.length) % items.length;
  $   el.active = next;
  $   setTimeout(() => el.querySelectorAll('[role=tab]')[next]?.focus(), 0);
  $ };
  <div role="tablist" aria-label="Demo tabs">
    $ items.forEach((t, i) => {
      <button role="tab" type="button" aria-selected="$(i === idx)" tabindex="$(i === idx ? 0 : -1)" onclick="el.active = i" onkeydown="onKey(event)">$(t.label)</button>
    $ })
  </div>
  <div role="tabpanel">$(items[idx] ? items[idx].body : '')</div>
</script>

<script type="jst" name="jst-toaster" attributes="toasts">
  $ once('toaster-api', () => {
  $   el.dismiss = (id) => { el.toasts = (el.toasts || []).filter(t => t.id !== id); };
  $   el.push = (message, variant) => {
  $     const id = (el.__n = (el.__n || 0) + 1);
  $     el.toasts = [...(el.toasts || []), { id, message, variant: variant || 'default' }];
  $     setTimeout(() => el.dismiss(id), 4000);
  $   };
  $   const route = (event) => commands(event, {
  $     '--toast': () => el.push(event.source.dataset.message, event.source.dataset.variant),
  $   });
  $   el.addEventListener('command', route);
  $   return () => el.removeEventListener('command', route);
  $ });
  $ (toasts || []).forEach(t => {
    <div class="jst-toast" data-variant="$(t.variant)" jst-key="$(t.id)">
      <span>$(t.message)</span>
      <button type="button" aria-label="Dismiss" onclick="el.dismiss(t.id)">×</button>
    </div>
  $ })
</script>

<script type="jst" name="jst-combobox" attributes="options query open highlighted">
  $ // `query open highlighted` are declared so assigning el.* re-renders; read
  $ // them as bare locals and give DERIVED values different names (no shadowing).
  $ const all = options || [];
  $ const q = (query || '').toLowerCase();
  $ const matches = q ? all.filter(o => o.toLowerCase().includes(q)) : all;
  $ const isOpen = !!open && matches.length > 0;
  $ const hi = Math.max(0, Math.min(highlighted || 0, matches.length - 1));
  $ const choose = (val) => { el.query = val; el.open = false; el.emit('change', val); };
  $ const onKey = (e) => {
  $   if (e.key === 'ArrowDown') { e.preventDefault(); el.open = true; el.highlighted = Math.min(hi + 1, matches.length - 1); }
  $   else if (e.key === 'ArrowUp') { e.preventDefault(); el.highlighted = Math.max(hi - 1, 0); }
  $   else if (e.key === 'Enter') { e.preventDefault(); if (isOpen && matches[hi] != null) choose(matches[hi]); }
  $   else if (e.key === 'Escape') { el.open = false; }
  $ };
  <input type="text" role="combobox" aria-expanded="$(isOpen)" placeholder="Search fruit…" .value="$(query || '')" oninput="el.query = event.target.value; el.open = true; el.highlighted = 0;" onkeydown="onKey(event)" onfocus="el.open = true" onblur="debounce(event, 150, () => { el.open = false })">
  $ if (isOpen) {
    <ul role="listbox">
      $ matches.forEach((o, i) => {
        <li role="option" data-active="$(i === hi)" aria-selected="$(i === hi)" onmousedown="event.preventDefault(); choose(o);">$(o)</li>
      $ })
    </ul>
  $ }
</script>

<script type="jst" name="jst-table" attributes="columns rows sortKey sortDir">
  $ const cols = columns || [];
  $ const data = rows || [];
  $ const key = sortKey || null;
  $ const dir = sortDir || 'asc';
  $ const sorted = key ? [...data].sort((a, b) => { const x = a[key], y = b[key]; const c = x < y ? -1 : x > y ? 1 : 0; return dir === 'asc' ? c : -c; }) : data;
  $ const toggleSort = (k) => { if (el.sortKey === k) { el.sortDir = (el.sortDir === 'asc' ? 'desc' : 'asc'); } else { el.sortKey = k; el.sortDir = 'asc'; } };
  <table>
    <thead>
      <tr>
        $ cols.forEach(c => {
          <th aria-sort="$(key === c.key ? (dir === 'asc' ? 'ascending' : 'descending') : 'none')">
            <button type="button" onclick="toggleSort(c.key)">$(c.label) $(key === c.key ? (dir === 'asc' ? '▲' : '▼') : '')</button>
          </th>
        $ })
      </tr>
    </thead>
    <tbody>
      $ sorted.forEach(r => {
        <tr jst-key="$(r.id)">
          $ cols.forEach(c => {
            <td>$(r[c.key])</td>
          $ })
        </tr>
      $ })
    </tbody>
  </table>
</script>
