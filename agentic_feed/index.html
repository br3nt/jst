<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Feed — JST prototype</title>
<script type="module" src="../jst.js"></script>
<style>
    * { box-sizing: border-box; }
    body { font-family: Georgia, 'Times New Roman', serif; background: #f7f5f0; color: #2c2a26; margin: 0; padding-bottom: 90px; }
    main { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem; }
    h1 { font-weight: 400; font-size: 1.3rem; color: #6b6457; border-bottom: 1px solid #e3ded2; padding-bottom: 10px; }

    /* feed cards */
    .feed-card { background: white; border: 1px solid #e7e2d6; border-radius: 6px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(90, 80, 60, 0.06); }
    .feed-card header { display: flex; justify-content: space-between; padding: 8px 14px 0; font-size: 0.78rem; color: #9a917f; font-family: ui-monospace, monospace; }
    .feed-card .persona { font-weight: bold; letter-spacing: 0.03em; }
    .feed-card .card-body { padding: 6px 14px 12px; }
    .from-human { border-left: 3px solid #b08d57; }
    .from-agent { border-left: 3px solid #5c6bc0; }
    .from-system { background: transparent; border: none; box-shadow: none; }
    .from-system header { display: none; }
    .from-system .card-body { padding: 0 14px; }
    .from-system .message-text { font-family: ui-monospace, monospace; font-size: 0.78rem; color: #9a917f; margin: 0; }

    .message-text { margin: 4px 0 0; line-height: 1.55; }

    /* documents */
    .doc h3 { margin: 6px 0 10px; font-weight: 500; color: #5c6bc0; font-size: 1.05rem; }
    .metric { font-size: 1rem; margin: 0 0 10px; }
    .metric strong { font-size: 1.8rem; color: #2c2a26; }
    .muted { color: #9a917f; font-size: 0.82rem; }
    .spark { display: flex; align-items: flex-end; gap: 4px; height: 56px; margin-bottom: 12px; }
    .spark-bar { flex: 1; background: linear-gradient(180deg, #7986cb, #5c6bc0); border-radius: 3px 3px 0 0; min-height: 4px; }
    .inbox-counts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .chip { background: #eef0fa; border: 1px solid #dde1f5; color: #4a5490; border-radius: 999px; padding: 3px 12px; font-size: 0.82rem; }

    /* affordances */
    .affordance { border-top: 1px dashed #e3ded2; padding-top: 12px; display: flex; flex-direction: column; gap: 10px; }
    .affordance label { display: flex; flex-direction: column; gap: 4px; font-size: 0.82rem; color: #6b6457; }
    .affordance input, .affordance textarea, .affordance select { font: inherit; font-size: 0.95rem; padding: 7px 10px; border: 1px solid #d8d2c2; border-radius: 5px; background: #fdfcf9; }
    .affordance button, button.primary { align-self: flex-start; background: #5c6bc0; color: white; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-family: inherit; }
    .affordance button:hover, button.primary:hover { background: #4a5490; }

    /* tasks */
    .task { padding: 4px 0; }
    .task-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .task-title { font-weight: 500; }
    .task-status { font-family: ui-monospace, monospace; font-size: 0.75rem; padding: 2px 10px; border-radius: 999px; background: #eef0fa; color: #4a5490; }
    .task.done .task-status { background: #e6f4e8; color: #2e7d32; }
    .task.cancelled .task-status { background: #f6e7e6; color: #b3433c; }
    .bar-track { background: #efece3; border-radius: 999px; height: 10px; overflow: hidden; margin-bottom: 8px; }
    .bar { background: linear-gradient(90deg, #7986cb, #5c6bc0); height: 100%; border-radius: 999px; transition: width 0.5s; }
    .task-cancel { background: none; border: 1px solid #d8d2c2; border-radius: 5px; padding: 4px 12px; cursor: pointer; color: #6b6457; font-size: 0.8rem; }

    /* composer */
    .composer-dock { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(247, 245, 240, 0.95); border-top: 1px solid #e3ded2; padding: 12px 0; backdrop-filter: blur(4px); }
    .composer { max-width: 720px; margin: 0 auto; padding: 0 1rem; display: flex; gap: 10px; }
    .composer input { flex: 1; font: inherit; padding: 10px 14px; border: 1px solid #d8d2c2; border-radius: 6px; background: white; }
</style>
</head>
<body>

<!-- ====================================================================
     Core component kit. App-specific cards (weight-card, inbox-card,
     task-card) are NOT defined here — their definitions arrive over SSE
     inside the fragments that first use them.
     ==================================================================== -->

<script type="jst" name="feed-card" props="persona time">
    $ const kind = persona === 'Brent' ? 'human' : (persona === 'system' ? 'system' : 'agent');
    <article class="feed-card from-$(kind)">
        <header><span class="persona">$(persona)</span><span class="time">$(time)</span></header>
        <div class="card-body">$(slot())</div>
    </article>
</script>

<script type="jst" name="message-card" props="text">
    <p class="message-text">$(text)</p>
</script>

<!-- The renderer for affordances: the JST equivalent of app.rb's form_html.
     The server ships field DEFINITIONS as a JSON attribute; this authored
     template owns all markup. Submissions emit a bubbling 'affordance' event
     carrying { docId, action, values } — the page posts it to /interactions. -->
<script type="jst" name="affordance-form" props="docId action submitLabel fields">
    <form class="affordance" @submit="$(event => {
        event.preventDefault();
        const values = {};
        el.querySelectorAll('[name]').forEach(field => values[field.name] = field.value);
        el.emit('affordance', { docId, action, values });
        event.target.reset();
    })">
        $ (fields || []).forEach(field => {
            <label>
                <span>$(field.label || field.name)</span>
                $ if (field.type === 'textarea') {
                    <textarea name="$(field.name)" rows="3"></textarea>
                $ } else if (field.type === 'select') {
                    <select name="$(field.name)">
                        $ (field.options || []).forEach(option => {
                            <option>$(option)</option>
                        $ })
                    </select>
                $ } else {
                    <input type="$(field.type || 'text')" name="$(field.name)" step="any">
                $ }
            </label>
        $ })
        <button>$(submitLabel || 'Submit')</button>
    </form>
</script>

<script type="jst" name="feed-composer">
    <form class="composer" @submit="$(event => {
        event.preventDefault();
        const input = el.querySelector('input');
        if (!input.value.trim()) return;
        el.emit('send', input.value);
        input.value = '';
    })">
        <input type="text" placeholder='Message the space… (try: "show my weight", "open the inbox", "plan a weekend trip")' autocomplete="off">
        <button class="primary">Send</button>
    </form>
</script>

<!-- ==================== page ==================== -->

<main>
    <h1>Agentic Feed <span class="muted">— hypermedia fragments over SSE, rendered by JST</span></h1>
    <div id="feed"></div>
</main>

<div class="composer-dock">
    <feed-composer id="composer"></feed-composer>
</div>

<script>
    const feed = document.getElementById('feed');

    // ---- downward: hypermedia fragments stream in over SSE -------------
    // 'append' events carry fragment HTML (possibly including a new
    // <script type="jst"> definition — JST registers it automatically).
    // 'morph' events update a card's attributes; JST re-renders it in
    // place, preserving form state and focus.
    const source = new EventSource('/events');
    source.onmessage = messageEvent => {
        const event = JSON.parse(messageEvent.data);

        if (event.kind === 'append') {
            feed.insertAdjacentHTML('beforeend', event.html);
            window.scrollTo(0, document.body.scrollHeight);
        } else if (event.kind === 'morph') {
            const target = document.getElementById(event.target);
            if (!target) return;
            Object.entries(event.attrs).forEach(([name, value]) => {
                target.setAttribute(name, typeof value === 'string' ? value : JSON.stringify(value));
            });
        }
    };

    // ---- upward: human actions condense into events the agent sees -----
    const post = (path, body) => fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
    });

    document.addEventListener('send', event => post('/messages', { text: event.detail, persona: 'Brent' }));
    document.addEventListener('affordance', event => post('/interactions', event.detail));
    document.addEventListener('task-cancel', event => post('/interactions', { action: 'cancel_task', taskId: event.detail }));
</script>

</body>
</html>
