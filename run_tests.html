<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>JST Framework Unit Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .test { margin: 10px 0; padding: 15px; border-left: 5px solid #444; background: #252526; border-radius: 0 4px 4px 0; }
        .test-passed { border-left-color: #4ec9b0; }
        .test-failed { border-left-color: #f48771; }
        .test-name { font-weight: bold; margin-bottom: 8px; color: #9cdcfe; font-size: 1.1rem; }
        .test-error-description { color: #f48771; margin-top: 10px; white-space: pre-wrap; background: #3c3c3c; padding: 10px; border-radius: 4px; }
        header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #ce9178; }
    </style>
</head>
<body>
    <header>
        <h1>JST Engine Verification</h1>
        <p>Running internal lexer, interpreter and runtime tests...</p>
    </header>
    <div id="browser-test-summary"
         data-status="running"
         data-total="0"
         data-passed="0"
         data-failed="0">Running browser tests...</div>
    <div id="test-results"></div>

    <script type="module">
        import { TestSuite, isEqual } from './test_suite.js';
        import { parseTemplateScript } from './parser.js';
        import { interpretTemplateTokens } from './interpreter.js';
        import {
            configure,
            registerCustomElementFromTemplate,
            resetJstForTests,
            version,
        } from './jst.js';
        import './jst-nav.js';
        import './jst-behaviors.js';

        const resultsContainer = document.getElementById('test-results');
        const summaryElement = document.getElementById('browser-test-summary');
        const suite = new TestSuite(resultsContainer);
        let uniqueCounter = 0;
        window.__jstTestSummary = {
            status: 'running',
            total: 0,
            passed: 0,
            failed: 0,
        };

        const nextName = (prefix) => `${prefix}-${++uniqueCounter}`;
        const flushRender = async () => {
            // Drain the microtask queue (renders), then once more for renders
            // queued by other renders (parent -> child cascades).
            await new Promise(resolve => setTimeout(resolve, 0));
            await new Promise(resolve => setTimeout(resolve, 0));
        };

        const createTemplate = ({ name, attributes = [], body }) => {
            const template = document.createElement('script');
            template.type = 'jst';
            template.setAttribute('name', name);
            attributes.forEach(attr => {
                if (typeof attr === 'string') {
                    template.setAttribute(attr, '');
                } else {
                    template.setAttribute(attr.name, attr.value);
                }
            });
            template.innerHTML = body;
            return template;
        };

        const withConsoleSpy = async (method, testFn) => {
            const original = console[method];
            const calls = [];
            console[method] = (...args) => {
                calls.push(args);
                return original.apply(console, args);
            };

            try {
                await testFn(calls);
            } finally {
                console[method] = original;
            }
        };

        const updateSummary = (status = 'running') => {
            const tests = Array.from(document.querySelectorAll('#test-results > .test'));
            const passed = tests.filter(test => test.classList.contains('test-passed')).length;
            const failed = tests.filter(test => test.classList.contains('test-failed')).length;
            const total = tests.length;

            window.__jstTestSummary = { status, total, passed, failed };
            summaryElement.dataset.status = status;
            summaryElement.dataset.total = String(total);
            summaryElement.dataset.passed = String(passed);
            summaryElement.dataset.failed = String(failed);
            summaryElement.textContent = `${status.toUpperCase()}: ${passed}/${total} passed, ${failed} failed`;
        };

        const runSuite = async () => {
        suite.test("Lexer: Line Directive Boundary", (t) => {
            t.case("Correctly isolates consecutive $ lines", () => {
                const script = "$ const a = 1;\n$ const b = 2;";
                const program = parseTemplateScript(script);
                const body = interpretTemplateTokens(program.tokens);

                const hasIllegalDollar = /const a = 1;.*\$.*const b = 2;/s.test(body);
                isEqual(false, hasIllegalDollar, "Generated body should not contain $ between JS lines");
            });
        });

        suite.test("Lexer: Strings Inside Expressions", (t) => {
            t.case("Parens inside string literals do not unbalance $(...)", () => {
                const script = "$(text.split(')').length)";
                const program = parseTemplateScript(script);
                const body = interpretTemplateTokens(program.tokens);

                isEqual(true, body.includes("text.split(')').length"), "Expression should survive a paren inside a string");
            });

            t.case("Angle brackets inside strings do not end a $ line", () => {
                const script = "$ const s = \"<div>\" + name;";
                const program = parseTemplateScript(script);
                const body = interpretTemplateTokens(program.tokens);

                isEqual(true, body.includes('const s = "<div>" + name;'), "Line directive should keep '<div>' inside the string");
            });
        });

        suite.test("Interpreter: JS Token Merging", (t) => {
            t.case("Merges adjacent JS tokens with whitespace/newlines", () => {
                const script = "$ if (true) {\n$   return 'ok';\n$ }";
                const program = parseTemplateScript(script);
                const body = interpretTemplateTokens(program.tokens);

                isEqual(true, body.includes("if (true)"), "Should contain 'if' statement");
                isEqual(true, body.includes("return 'ok'"), "Should contain 'return' statement");
                isEqual(false, body.includes("$"), "Should not contain any literal JST markers ($)");
            });
        });

        suite.test("Interpreter: Escaped Interpolation", (t) => {
            t.case("Wraps expressions in the escape helper", () => {
                const script = "Value: $(val)";
                const program = parseTemplateScript(script);
                const body = interpretTemplateTokens(program.tokens);

                isEqual(true, body.includes('lines.push("Value: ")'), "Should isolate static HTML prefix");
                isEqual(true, body.includes("lines.push(__esc(val))"), "Should escape interpolated expressions");
            });
        });

        suite.test("Interpreter: Property And Event Bindings", (t) => {
            t.case("Compiles .prop= to a property binding", () => {
                const script = '<x-thing .data="$(value)"></x-thing>';
                const program = parseTemplateScript(script);
                const body = interpretTemplateTokens(program.tokens);

                isEqual(true, body.includes('__bind("prop", "data", (value))'), "Should emit a prop binding");
                isEqual(false, body.includes('.data='), "Should strip the .prop= source from output HTML");
            });

            t.case("Compiles on<event>= to a function-body event binding", () => {
                const script = '<button onclick="handler(event)">go</button>';
                const program = parseTemplateScript(script);
                const body = interpretTemplateTokens(program.tokens);

                isEqual(true, body.includes('__bind("event", "click", function (event) { handler(event) })'), "Should emit a function-body event binding with the on prefix stripped");
            });

            t.case("Rejects $() expressions in on* handler bodies", () => {
                let threw = false;
                try {
                    const program = parseTemplateScript('<button onclick="$(handler)">go</button>');
                    interpretTemplateTokens(program.tokens);
                } catch (error) {
                    threw = /function bodies now/.test(error.message);
                }
                isEqual(true, threw, "Should reject the removed $() expression-handler syntax");
            });
        });

        await suite.testAsync("JST Runtime: configure API Is Exposed Deliberately", async () => {
            // document.jst was removed: the ES-module exports are canonical and a
            // reduced window.JST mirrors them. document.jst must not exist.
            const originalDev = window.JST.config.dev;
            const configReference = window.JST.config;

            try {
                isEqual(undefined, document.jst, 'Expected document.jst to be removed');
                isEqual(true, /^\d+\.\d+\.\d+/.test(version), 'Expected the version export to be a semver string');
                isEqual(version, window.JST.version, 'Expected window.JST.version to mirror the module export');
                isEqual(configure, window.JST.configure, 'Expected window.JST.configure to mirror the module export');
                isEqual(configReference, window.JST.config, 'Expected window.JST.config to reference the live config object');

                const result = window.JST.configure({ dev: !originalDev });

                isEqual(configReference, result, 'Expected configure to preserve config object identity');
                isEqual(!originalDev, window.JST.config.dev, 'Expected window.JST.config to stay live');
            } finally {
                configure({ dev: originalDev });
            }
        });

        await suite.testAsync("JST Runtime: Templates Added Later Auto-Register", async () => {
            const componentName = nextName('x-late');
            const template = createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'msg' }],
                body: `<div>$(msg)</div>`,
            });

            document.body.appendChild(template);
            await flushRender();

            try {
                isEqual(true, !!customElements.get(componentName), 'Expected MutationObserver to register the late template');
            } finally {
                template.remove();
            }
        });

        await suite.testAsync("JST Runtime: autoRegisterRoot Scopes Late Template Registration", async () => {
            const insideName = nextName('x-scoped-inside');
            const outsideName = nextName('x-scoped-outside');
            const root = document.createElement('section');
            const insideTemplate = createTemplate({
                name: insideName,
                attributes: [{ name: 'attributes', value: 'msg' }],
                body: `<span>$(msg)</span>`,
            });
            const outsideTemplate = createTemplate({
                name: outsideName,
                attributes: [{ name: 'attributes', value: 'msg' }],
                body: `<span>$(msg)</span>`,
            });

            document.body.appendChild(root);
            configure({ autoRegister: true, autoRegisterRoot: root, resolveTemplate: null });

            document.body.appendChild(outsideTemplate);
            root.appendChild(insideTemplate);
            await flushRender();

            try {
                isEqual(false, !!customElements.get(outsideName), 'Expected templates outside autoRegisterRoot to be ignored');
                isEqual(true, !!customElements.get(insideName), 'Expected templates inside autoRegisterRoot to register');
            } finally {
                outsideTemplate.remove();
                root.remove();
                configure({ autoRegister: true, autoRegisterRoot: null, resolveTemplate: null });
            }
        });

        await suite.testAsync("JST Runtime: Missing Template Resolver", async () => {
            const componentName = nextName('x-resolved');
            const fragment = `<script type="jst" name="${componentName}" attributes="msg"><p class="resolved">$(msg)</p><\/script>`;
            const url = `data:text/html;charset=utf-8,${encodeURIComponent(fragment)}`;

            configure({
                resolveTemplate(name) {
                    return name === componentName ? url : null;
                },
            });

            const element = document.createElement(componentName);
            element.setAttribute('msg', 'from resolver');
            document.body.appendChild(element);

            for (let i = 0; i < 20 && !element.querySelector('.resolved'); i++) {
                await flushRender();
            }

            try {
                isEqual('from resolver', element.querySelector('.resolved')?.textContent, 'Expected missing template resolver to fetch, register, and upgrade the element');
            } finally {
                configure({ resolveTemplate: null });
                element.remove();
                document.querySelector(`[data-jst-resolved-from="${url}"]`)?.remove();
            }
        });

        await suite.testAsync("JST Runtime: Resolver Set After Element Is Present Still Upgrades It (#21)", async () => {
            // Reproduces the initial-load gap: the element is in the DOM and
            // scanned (here, by the observer) while resolveTemplate is still
            // null — exactly the state auto-init leaves at module eval — and the
            // resolver is configured only afterward. configure() must re-scan so
            // the already-present element resolves; otherwise it never upgrades.
            const componentName = nextName('x-initial-load');
            const fragment = `<script type="jst" name="${componentName}" attributes="msg"><p class="resolved">$(msg)</p><\/script>`;
            const url = `data:text/html;charset=utf-8,${encodeURIComponent(fragment)}`;

            // Resolver is null: element present + scanned, nothing resolves it.
            configure({ resolveTemplate: null });
            const element = document.createElement(componentName);
            element.setAttribute('msg', 'from initial load');
            document.body.appendChild(element);
            await flushRender();
            isEqual(undefined, customElements.get(componentName), 'Precondition: element should be unresolved while resolver is null');

            // Now wire the resolver, as an importing module would after eval.
            configure({
                resolveTemplate(name) {
                    return name === componentName ? url : null;
                },
            });

            for (let i = 0; i < 20 && !element.querySelector('.resolved'); i++) {
                await flushRender();
            }

            try {
                isEqual('from initial load', element.querySelector('.resolved')?.textContent, 'Expected configure() to re-scan and upgrade the already-present element once the resolver was set');
            } finally {
                configure({ resolveTemplate: null });
                element.remove();
                document.querySelector(`[data-jst-resolved-from="${url}"]`)?.remove();
            }
        });

        await suite.testAsync("JST Runtime: autoRegister False Blocks Scripts But Allows Trusted Resolver", async () => {
            const blockedName = nextName('x-blocked-late');
            const resolvedName = nextName('x-resolved-locked');
            const blockedTemplate = createTemplate({
                name: blockedName,
                attributes: [{ name: 'attributes', value: 'msg' }],
                body: `<p class="blocked">$(msg)</p>`,
            });
            const fragment = `<script type="jst" name="${resolvedName}" attributes="msg"><p class="resolved">$(msg)</p><\/script>`;
            const url = `data:text/html;charset=utf-8,${encodeURIComponent(fragment)}`;

            configure({
                autoRegister: false,
                autoRegisterRoot: null,
                resolveTemplate(name) {
                    return name === resolvedName ? url : null;
                },
            });

            document.body.appendChild(blockedTemplate);
            await flushRender();

            const element = document.createElement(resolvedName);
            element.setAttribute('msg', 'from resolver');
            document.body.appendChild(element);

            for (let i = 0; i < 20 && !element.querySelector('.resolved'); i++) {
                await flushRender();
            }

            try {
                isEqual(false, !!customElements.get(blockedName), 'Expected autoRegister:false to ignore inserted script templates');
                isEqual('from resolver', element.querySelector('.resolved')?.textContent, 'Expected whitelisted resolver to still fetch and register the missing component');
            } finally {
                blockedTemplate.remove();
                element.remove();
                document.querySelector(`[data-jst-resolved-from="${url}"]`)?.remove();
                configure({ autoRegister: true, autoRegisterRoot: null, resolveTemplate: null });
            }
        });

        await suite.testAsync("JST Runtime: Duplicate Template Names", async () => {
            const componentName = nextName('x-duplicate');
            const first = createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'value' }],
                body: `<div>First $(value)</div>`,
            });
            const second = createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'value' }],
                body: `<div>Second $(value)</div>`,
            });

            await withConsoleSpy('warn', async (calls) => {
                registerCustomElementFromTemplate(first);
                registerCustomElementFromTemplate(second);

                isEqual(1, calls.length, 'Expected a single duplicate-template warning');
                isEqual(true, String(calls[0][0]).includes(`Duplicate template name "${componentName}"`), 'Expected duplicate-template warning text');
            });
        });

        await suite.testAsync("JST Runtime: Existing Custom Element Warning", async () => {
            const componentName = nextName('x-existing');
            customElements.define(componentName, class extends HTMLElement {});

            const template = createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'value' }],
                body: `<div>$(value)</div>`,
            });

            await withConsoleSpy('warn', async (calls) => {
                registerCustomElementFromTemplate(template);

                isEqual(1, calls.length, 'Expected a single existing-element warning');
                isEqual(true, String(calls[0][0]).includes(`<${componentName}> is already registered`), 'Expected existing-element warning text');
            });
        });

        await suite.testAsync("JST Runtime: Interpolations Are Escaped", async () => {
            const componentName = nextName('x-escape');
            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'text' }],
                body: `<div class="out">$(text)</div>`,
            }));

            const element = document.createElement(componentName);
            element.text = '<img src=x onerror="window.__pwned = true">';
            document.body.appendChild(element);
            await flushRender();

            try {
                isEqual(null, element.querySelector('img'), 'Expected no element to be created from interpolated text');
                isEqual('<img src=x onerror="window.__pwned = true">', element.querySelector('.out').textContent, 'Expected the literal text to be visible');
                isEqual(undefined, window.__pwned, 'Expected no script execution from interpolated markup');
            } finally {
                element.remove();
                delete window.__pwned;
            }
        });

        await suite.testAsync("JST Runtime: trustedHTML() Opts Out Of Escaping", async () => {
            const componentName = nextName('x-trusted');
            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'html' }],
                body: `<div class="out">$(trustedHTML(html))</div>`,
            }));

            const element = document.createElement(componentName);
            element.html = '<b class="bold">bold</b>';
            document.body.appendChild(element);
            await flushRender();

            try {
                isEqual('bold', element.querySelector('.bold')?.textContent, 'Expected trustedHTML() HTML to be parsed as markup');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: url() Blocks Unsafe URL Schemes", async () => {
            const componentName = nextName('x-url-helper');
            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'href' }],
                body: `<a class="link" href="$(url(href))">link</a>`,
            }));

            const element = document.createElement(componentName);
            element.href = 'javascript:alert(1)';
            document.body.appendChild(element);
            await flushRender();

            try {
                isEqual('#', element.querySelector('.link').getAttribute('href'), 'Expected unsafe URL schemes to be replaced');

                element.href = '/safe/path';
                await flushRender();
                isEqual('/safe/path', element.querySelector('.link').getAttribute('href'), 'Expected relative URLs to pass through');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: JSON-Like Attribute Parsing", async () => {
            const componentName = nextName('x-json');
            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'count active label' }],
                body: `<div class="out">$(label): $(count + 1) $(active ? 'on' : 'off')</div>`,
            }));

            const element = document.createElement(componentName);
            element.setAttribute('count', '2');
            element.setAttribute('active', 'true');
            element.setAttribute('label', 'Total');
            document.body.appendChild(element);
            await flushRender();

            try {
                isEqual('Total: 3 on', element.querySelector('.out').textContent, 'Expected numbers and booleans to parse, plain text to stay a string');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: Kebab-Case Attrs Map To CamelCase Params", async () => {
            const componentName = nextName('x-kebab');
            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'userName' }],
                body: `<div class="out">$(userName)</div>`,
            }));

            const element = document.createElement(componentName);
            element.setAttribute('user-name', 'Brent');
            document.body.appendChild(element);
            await flushRender();

            try {
                isEqual('Brent', element.querySelector('.out').textContent, 'Expected user-name attr to populate userName prop');

                element.userName = 'Updated';
                await flushRender();
                isEqual('Updated', element.querySelector('.out').textContent, 'Expected camelCase property to drive the same prop');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: Properties Set Before Upgrade Are Kept", async () => {
            const componentName = nextName('x-preupgrade');

            // Create the element BEFORE the component is defined
            const element = document.createElement(componentName);
            element.items = [{ label: 'early' }];

            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'items' }],
                body: `<div class="out">$(items[0].label)</div>`,
            }));

            document.body.appendChild(element);
            await flushRender();

            try {
                isEqual('early', element.querySelector('.out').textContent, 'Expected pre-upgrade property value to survive the upgrade');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: .prop Bindings Pass Rich Data To Children", async () => {
            const childName = nextName('x-bind-child');
            const parentName = nextName('x-bind-parent');

            registerCustomElementFromTemplate(createTemplate({
                name: childName,
                attributes: [{ name: 'attributes', value: 'data' }],
                body: `<div class="label">$(data ? data.label : 'none')</div>`,
            }));

            registerCustomElementFromTemplate(createTemplate({
                name: parentName,
                attributes: [{ name: 'attributes', value: 'value' }],
                body: `<${childName} .data="$(value)"></${childName}>`,
            }));

            const element = document.createElement(parentName);
            element.value = { label: 'hello' };
            document.body.appendChild(element);
            await flushRender();

            try {
                isEqual('hello', element.querySelector('.label').textContent, 'Expected object to flow into child via .prop binding');
                isEqual(false, element.innerHTML.includes('jst-bind'), 'Expected binding markers to be stripped from the DOM');

                element.value = { label: 'world' };
                await flushRender();
                isEqual('world', element.querySelector('.label').textContent, 'Expected re-render to re-apply the binding');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: Parent Morph Flows .prop Into Nested Managed Child", async () => {
            const childName = nextName('x-i14-child');
            const parentName = nextName('x-i14-parent');

            registerCustomElementFromTemplate(createTemplate({
                name: childName,
                attributes: [{ name: 'attributes', value: 'value' }],
                body: `<div class="child">child:$(value && value.label ? value.label : value)</div>`,
            }));
            registerCustomElementFromTemplate(createTemplate({
                name: parentName,
                attributes: [{ name: 'attributes', value: 'payload' }],
                body: `<${childName} .value="$(payload)"></${childName}>`,
            }));

            const element = document.createElement(parentName);
            document.body.appendChild(element);
            element.payload = 'first';
            await flushRender();

            try {
                isEqual('child:first', element.querySelector('.child').textContent, 'initial property render');
                element.setAttribute('payload', JSON.stringify('second'));
                await flushRender();
                isEqual('child:second', element.querySelector('.child').textContent, 'string setAttribute should flow into child .prop');

                element.setAttribute('payload', JSON.stringify({ label: 'obj' }));
                await flushRender();
                isEqual('child:obj', element.querySelector('.child').textContent, 'object setAttribute should flow into child .prop');

                // Identity-stable mutation via property re-assign of a fresh object
                element.payload = { label: 'mutated' };
                await flushRender();
                isEqual('child:mutated', element.querySelector('.child').textContent, 'object property should flow into child .prop');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: Router Parent Flows New Data Into Per-Kind Child", async () => {
            const aName = nextName('x-i14-a');
            const bName = nextName('x-i14-b');
            const routerName = nextName('x-i14-router');

            registerCustomElementFromTemplate(createTemplate({
                name: aName, attributes: [{ name: 'attributes', value: 'item' }],
                body: `<div class="a">A:$(item.body)</div>`,
            }));
            registerCustomElementFromTemplate(createTemplate({
                name: bName, attributes: [{ name: 'attributes', value: 'item' }],
                body: `<div class="b">B:$(item.body)</div>`,
            }));
            registerCustomElementFromTemplate(createTemplate({
                name: routerName, attributes: [{ name: 'attributes', value: 'kind item' }],
                body: `$ if (kind === 'a') {\n<${aName} .item="$(item)"></${aName}>\n$ } else {\n<${bName} .item="$(item)"></${bName}>\n$ }`,
            }));

            const element = document.createElement(routerName);
            document.body.appendChild(element);
            element.setAttribute('kind', 'a');
            element.item = { body: 'one' };
            await flushRender();

            try {
                isEqual('A:one', element.querySelector('.a').textContent, 'router initial child A');
                // Same kind, new data via setAttribute on parent
                element.item = { body: 'two' };
                element.setAttribute('kind', 'a');
                await flushRender();
                isEqual('A:two', element.querySelector('.a').textContent, 'router same-kind new data flows to child');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: @event Bindings And emit()", async () => {
            const componentName = nextName('x-emitter');
            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [{ name: 'attributes', value: 'count' }],
                body: `<button class="btn" onclick="el.emit('poke', { count })">go</button>`,
            }));

            const element = document.createElement(componentName);
            element.setAttribute('count', '7');

            let received = null;
            element.addEventListener('poke', event => { received = event.detail; });

            document.body.appendChild(element);
            await flushRender();

            try {
                element.querySelector('.btn').click();
                isEqual(7, received?.count, 'Expected emitted CustomEvent detail to reach the listener');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: Combinators + Registration Modifiers", async () => {
            const componentName = nextName('x-modifiers');
            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [],
                body: `<form class="form" onsubmit="event.preventDefault(); el.emit('saved')">

                body: `<div class="target" oncommand="commands(event, { '--save': () => el.emit('routed', event.command) })">t</div>`,
            }));
            const element = document.createElement(componentName);
            let routed = null;
            element.addEventListener('routed', e => { routed = e.detail; });
            document.body.appendChild(element);
            await flushRender();
            try {
                // CommandEvent isn't in every engine yet; commands() only reads
                // event.command, so a plain Event carrying it exercises the path.
                const commandEvent = new Event('command');
                commandEvent.command = '--save';
                element.querySelector('.target').dispatchEvent(commandEvent);
                isEqual('--save', routed, 'Expected commands() in template scope to route the matching command');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: handler body gets the native contract (event + this)", async () => {
            const componentName = nextName('x-contract');
            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [],
                body: `<button class="btn" onclick="el.emit('probe', { isButton: this === event.currentTarget, hasEvent: !!event })">go</button>`,
            }));
            const element = document.createElement(componentName);
            let detail = null;
            element.addEventListener('probe', e => { detail = e.detail; });
            document.body.appendChild(element);
            await flushRender();
            try {
                element.querySelector('.btn').click();
                isEqual(true, detail?.hasEvent, 'Expected event in scope in the handler body');
                isEqual(true, detail?.isButton, 'Expected this to be the element the listener is on');
            } finally {
                element.remove();
            }
        });

        await suite.testAsync("JST Runtime: synthetic onreveal fires when the element scrolls into view", async () => {
            const componentName = nextName('x-reveal');
            registerCustomElementFromTemplate(createTemplate({
                name: componentName,
                attributes: [],
                body: `<div class="spacer" style="height:120vh"></div><p class="lazy" onreveal="el.emit('revealed')">lazy</p>`,
            }));
            const element = document.createElement(componentName);
            let revealed = 0;
            element.addEventListener('revealed', () => { revealed++; });
            document.body.appendChild(element);
            await flushRender();
            try {
                element.querySelector('.lazy').scrollIntoView();
                await sleep(120);
                isEqual(true, revealed >= 1, 'Expected the reveal CustomEvent to fire on scroll into view');
            } finally {
                element.remove();
                window.scrollTo(0, 0);
            }
        });

        await suite.testAsync("JST Runtime: unsafeInlineHandlers wires non-platform body handlers (opt-in)", async () => {
            configure({ unsafeInlineHandlers: true });
            const zone = document.createElement('div');
            zone.innerHTML = `
                <div style="height:120vh"></div>
                <p id="lazy-body" onreveal="window.__bodyRevealed = (window.__bodyRevealed || 0) + 1">lazy</p>
                <div id="custom-body" onitem-selected="window.__bodyCustom = (window.__bodyCustom || 0) + 1; window.__bodyCustomThis = (this === event.currentTarget)"></div>
                <button id="native-body" onclick="window.__bodyNative = (window.__bodyNative || 0) + 1">n</button>
            `;
            document.body.appendChild(zone);
            await sleep(30);   // inline wiring rides a MutationObserver
            try {
                // Custom component event: platform ignores onitem-selected; JST wires it.
                zone.querySelector('#custom-body').dispatchEvent(new CustomEvent('item-selected'));
                isEqual(1, window.__bodyCustom, 'Expected the custom-event inline body to run');
                isEqual(true, window.__bodyCustomThis, 'Expected this to be the element (native contract)');

                // Platform event: browser owns onclick; JST must NOT double-wire it.
                zone.querySelector('#native-body').click();
                isEqual(1, window.__bodyNative, 'Expected the native handler to fire exactly once (no double wiring)');

                zone.querySelector('#lazy-body').scrollIntoView();
                await sleep(120);
                isEqual(true, (window.__bodyRevealed || 0) >= 1, 'Expected the inline onreveal body to run');
            } finally {
                configure({ unsafeInlineHandlers: false });
                delete window.__bodyRevealed; delete window.__bodyCustom; delete window.__bodyCustomThis; delete window.__bodyNative;
                zone.remove();
                window.scrollTo(0, 0);
            }
        });

        const withNavZone = async (innerHTML, testFn) => {
            const originalFetch = window.fetch;
            const requests = [];
            window.fetch = async (url, opts = {}) => {
                requests.push({ url: String(url), method: (opts.method || 'GET') });
                return new Response('<p class="hit">hit</p>', { status: 200, headers: { 'Content-Type': 'text/html' } });
            };
            const zone = document.createElement('div');
            zone.innerHTML = innerHTML;
            document.body.appendChild(zone);
            await sleep(30);   // jst-nav wiring rides the MutationObserver — yield first
            try {
                await testFn(zone, requests);
            } finally {
                window.fetch = originalFetch;
                zone.remove();
            }
        };

        await suite.testAsync("JST Nav: an enhanced link fetches its href on its native activation", async () => {
            await withNavZone(`
                <div id="nav-out-1"></div>
                <a href="/page/2" jst-target="#nav-out-1">next</a>
            `, async (zone, requests) => {
                zone.querySelector('a').click();
                await sleep(30);
                isEqual(1, requests.length, 'Expected the native click to fire the request');
                isEqual(true, requests[0].url.includes('/page/2'), 'Expected the URL to come from href');
                isEqual('hit', zone.querySelector('#nav-out-1 .hit')?.textContent, 'Expected the response to swap into the target');
            });
        });

        await suite.testAsync("JST Nav: an enhanced form posts its action with its params", async () => {
            await withNavZone(`
                <div id="nav-out-2"></div>
                <form action="/orders" method="post" jst-target="#nav-out-2">
                    <input name="q" value="abc"><button type="submit">go</button>
                </form>
            `, async (zone, requests) => {
                zone.querySelector('form').dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
                await sleep(30);
                isEqual(1, requests.length, 'Expected submit to fire the request');
                isEqual('POST', requests[0].method, 'Expected the native method attribute to set the verb');
            });
        });

        await suite.testAsync("JST Nav: swap() is the imperative primitive", async () => {
            await withNavZone(`
                <div id="nav-out-3"></div>
            `, async (zone, requests) => {
                await window.JST.nav.swap('#nav-out-3', '/feed', { method: 'POST' });
                isEqual(1, requests.length, 'Expected swap() to fetch');
                isEqual('POST', requests[0].method, 'Expected fetch options to pass through');
                isEqual('hit', zone.querySelector('#nav-out-3 .hit')?.textContent, 'Expected the response to land in the target');
            });
        });

        await suite.testAsync("JST Nav: a swap that finds no target is a detectable miss, not a silent success", async () => {
            await withNavZone(`
                <div id="nav-miss-1"></div>
                <a href="/page/9" jst-target="#nav-miss-1" jst-swap="outerHTML" jst-push-url>next</a>
            `, async (zone, requests) => {
                // Simulate the #57 race deterministically: something else replaces
                // the target after the response is read but before the swap applies.
                const events = [];
                const track = (e) => events.push(e.type);
                document.addEventListener('jst:swapped', track);
                document.addEventListener('jst:swap-missed', track);
                document.addEventListener('jst:before-swap', () => {
                    zone.querySelector('#nav-miss-1').remove();
                }, { once: true });
                const urlBefore = location.href;
                try {
                    zone.querySelector('a').click();
                    await sleep(40);
                    isEqual(true, events.includes('jst:swap-missed'), 'Expected a bubbling jst:swap-missed');
                    isEqual(false, events.includes('jst:swapped'), 'Expected NO jst:swapped for a missed swap');
                    isEqual(urlBefore, location.href, 'Expected the history push to be skipped on a miss');
                } finally {
                    document.removeEventListener('jst:swapped', track);
                    document.removeEventListener('jst:swap-missed', track);
                }
            });
        });

        await suite.testAsync("JST Nav: a fresh target appearing by write time wins the re-resolution", async () => {
            await withNavZone(`
                <div class="wrap-a"><div id="nav-fresh"></div></div>
                <a href="/page/10" jst-target="#nav-fresh">next</a>
            `, async (zone, requests) => {
                // Replace the resolved node with a NEW node of the same id before
                // the swap applies: the write must land in the fresh node.
                document.addEventListener('jst:before-swap', () => {
                    const old = zone.querySelector('#nav-fresh');
                    const fresh = document.createElement('div');
                    fresh.id = 'nav-fresh';
                    fresh.className = 'fresh';
                    old.replaceWith(fresh);
                }, { once: true });
                zone.querySelector('a').click();
                await sleep(40);
                isEqual('hit', zone.querySelector('#nav-fresh.fresh .hit')?.textContent, 'Expected the swap to land in the re-resolved fresh node');
            });
        });

        await suite.testAsync("JST Nav: navigate() runs the full pipeline for programmatic navigation", async () => {
            await withNavZone(`
                <div id="nav-prog"></div>
            `, async (zone, requests) => {
                const seen = [];
                const listener = (e) => seen.push({ type: e.type, navMode: e.detail?.el?.dataset?.navMode });
                for (const t of ['jst:before-request', 'jst:before-swap', 'jst:swapped']) document.addEventListener(t, listener);
                const urlBefore = location.href;
                try {
                    const res = await window.JST.nav.navigate('/orders?tag=x', {
                        target: '#nav-prog', swap: 'innerHTML', replaceUrl: true,
                        dataset: { navMode: 'replace' },
                    });
                    isEqual(200, res?.status, 'Expected navigate() to return the Response');
                    isEqual('hit', zone.querySelector('#nav-prog .hit')?.textContent, 'Expected the swap to land');
                    isEqual(['jst:before-request', 'jst:before-swap', 'jst:swapped'].join(','), seen.map(s => s.type).join(','), 'Expected the full lifecycle to bubble to document');
                    isEqual('replace', seen[0].navMode, 'Expected the driver dataset to reach delegated listeners');
                    isEqual(true, location.href.includes('/orders?tag=x'), 'Expected replaceUrl to update the URL');
                    isEqual(null, document.querySelector('a[href="/orders?tag=x"]'), 'Expected the driver element to be removed');
                } finally {
                    for (const t of ['jst:before-request', 'jst:before-swap', 'jst:swapped']) document.removeEventListener(t, listener);
                    history.replaceState({}, '', urlBefore);
                }
            });
        });

        await suite.testAsync("JST Nav: removed attributes fail loud and do not fire", async () => {
            await withConsoleSpy('error', async (calls) => {
                await withNavZone(`
                    <div id="nav-out-4"></div>
                    <button ${'jst-g' + 'et'}="/legacy" jst-target="#nav-out-4">go</button>
                `, async (zone, requests) => {
                    isEqual(true, calls.some(args => /removed in v0\.6\.0/.test(String(args[0]))), 'Expected a loud removed-attribute error');
                    zone.querySelector('button').click();
                    await sleep(30);
                    isEqual(0, requests.length, 'Expected no request: buttons are not enhanceable and jst-get is gone');
                });
            });
        });

        await suite.testAsync("JST Behaviors: jst-include fills itself from src", async () => {
            const originalFetch = window.fetch;
            window.fetch = async (url) => new Response(`<p class="inc">from ${url}</p>`, { status: 200, headers: { 'Content-Type': 'text/html' } });
            const zone = document.createElement('div');
            zone.innerHTML = `<jst-include src="/banner"></jst-include>`;
            document.body.appendChild(zone);
            try {
                await sleep(30);
                isEqual('from /banner', zone.querySelector('.inc')?.textContent, 'Expected the eager include to fill itself');
            } finally {
                window.fetch = originalFetch;
                zone.remove();
            }
        });
        };

        try {
            await runSuite();
            updateSummary('passed');
        } catch (error) {
            console.error('JST test harness aborted', error);
            updateSummary('failed');
        }
    </script>
</body>
</html>
