      - generic [ref=e35]:
        - heading "Short Version" [level=2] [ref=e36]
        - paragraph [ref=e37]: Most web apps turn database state into backend models, then DTOs, then frontend models, then components, then HTML. JST asks whether the backend and browser can both speak the final format directly.
        - paragraph [ref=e38]: A JST component is HTML plus JavaScript. The browser registers it as a real custom element. A server can emit that same component syntax in an ordinary HTML response.
        - generic [ref=e39]: "Start with resourceful URLs and full-page navigation. Add fragment swaps only where they make a workflow better: inline validation, load-more feeds, modal bodies, expanding rows, or shipping a component definition the page did not know yet."
        - generic [ref=e40]:
          - generic [ref=e41]:
            - heading "Use JST When" [level=3] [ref=e42]
            - paragraph [ref=e43]: "You want the backend and frontend to share the same UI representation: HTML. JST fits static sites, SSR apps, HATEOAS apps, internal tools, progressively enhanced pages, quick prototypes including a single HTML file opened straight from disk, and apps whose state lives in the DOM, the URL, or the server rather than a client store."
          - generic [ref=e44]:
            - heading "Avoid JST When" [level=3] [ref=e45]
            - paragraph [ref=e46]: You need a large client-owned SPA, a big catalogue of ready-made third-party components today, fine-grained reactive state graphs, or TypeScript-first component authoring.
