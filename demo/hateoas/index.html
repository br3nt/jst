<!DOCTYPE html>
<!-- JST — JavaScript Templates · © Brent Jacobs (https://github.com/br3nt) · https://github.com/br3nt/jst -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JST · HATEOAS over a Service Worker</title>

<!-- The framework. Importing it starts JST's MutationObserver, so any
     <script type="jst"> that arrives later (inside a fetched fragment) is
     registered the instant it is inserted. -->
<script type="module" src="../../jst.js"></script>

<style>
  :root { --line: #e6e9ee; --muted: #6b7280; --accent: #1da1f2; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f5f7fa; color: #14171a; margin: 0;
  }
  main { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; border-inline: 1px solid var(--line); }
  .masthead { position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(6px);
    padding: 14px 18px; border-bottom: 1px solid var(--line); z-index: 2; }
  .masthead h1 { margin: 0; font-size: 1.15rem; }
  .masthead p { margin: 4px 0 0; font-size: 0.8rem; color: var(--muted); }

  #app { display: flex; flex-direction: column; }

  /* feed-item (shipped over the wire by the service worker) */
  .card { display: flex; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .avatar { flex: 0 0 44px; width: 44px; height: 44px; border-radius: 50%;
    background: var(--c, #ccc); color: #fff; font-weight: 700; font-size: 1.2rem;
    display: grid; place-items: center; }
  .content { flex: 1; min-width: 0; }
  .content header { font-size: 0.9rem; }
  .content header strong { font-weight: 700; }
  .handle, .dot, time { color: var(--muted); font-weight: 400; }
  .body { margin: 4px 0 10px; line-height: 1.5; }

  .actions { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .act { background: none; border: none; padding: 4px 0; cursor: pointer; font: inherit;
    color: var(--muted); text-decoration: none; }
  .act.like:hover { color: #e0245e; }
  .act.source:hover, .act.link:hover { color: var(--accent); }
  .badge { color: #e0245e; font-weight: 600; }
  .act.link { color: var(--accent); }
  .likers { width: 100%; }
  .likers-list { margin: 6px 0 0; padding-left: 18px; color: var(--muted); font-size: 0.85rem; }

  .more { margin: 16px auto; display: block; background: var(--accent); color: #fff; border: none;
    border-radius: 999px; padding: 10px 22px; font: inherit; font-weight: 600; cursor: pointer; }
  .more:disabled { opacity: 0.5; cursor: default; }
  .end { text-align: center; color: var(--muted); padding: 18px; font-size: 0.9rem; }
  .status { text-align: center; color: var(--muted); padding: 24px; font-size: 0.9rem; }
</style>
</head>
<body>

<main>
  <div class="masthead">
    <h1>The Hypermedia Timeline</h1>
    <p>HTML fragments from a service worker — each carries its own UI, behaviour and next actions. No JSON, no client app.</p>
  </div>

  <!-- This page defines NO application components. feed-item and like-badge
       arrive inside the fragments the (mock) server returns. -->
  <div id="app">
    <p class="status">Starting the service worker…</p>
  </div>
</main>

<script type="module">
  const app = document.getElementById('app');

  // The entire "client": fetch a URL, drop the returned HTML into the page.
  // Because JST observes the DOM, any <script type="jst"> in that HTML
  // registers itself and the elements beside it come alive — no rendering
  // code, no view models, no JSON parsing.
  async function inject(url) {
    app.innerHTML = await (await fetch(url)).text();
  }

  // The only wiring the page needs: follow the next-action links the server
  // embeds in its fragments. Event delegation, so it works for markup that
  // does not exist yet. The "Load more" button carries its own target URL
  // (data-href) — classic HATEOAS: the client follows links it is given.
  app.addEventListener('click', async (event) => {
    const more = event.target.closest('[data-action="load-more"]');
    if (!more) return;
    event.preventDefault();
    more.disabled = true;
    const html = await (await fetch(more.dataset.href)).text();
    more.remove();               // the response brings the next button with it
    app.insertAdjacentHTML('beforeend', html);
  });

  function start() {
    inject('api/feed').catch((err) => {
      app.innerHTML = `<p class="status">Failed to load feed: ${err}</p>`;
    });
  }

  // Register the worker that stands in for the backend. On the very first
  // visit the page is not yet controlled by the worker, so its fetches would
  // hit the (non-existent) network. We wait for the worker to take control,
  // then reload once so every /api/ request is intercepted.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').then(() => {
      if (navigator.serviceWorker.controller) {
        start();
      } else {
        navigator.serviceWorker.addEventListener(
          'controllerchange',
          () => location.reload(),
          { once: true },
        );
      }
    }).catch((err) => {
      app.innerHTML = `<p class="status">Service worker registration failed: ${err}<br>Are you serving this over http://, not file://?</p>`;
    });
  } else {
    app.innerHTML = '<p class="status">This demo needs Service Worker support.</p>';
  }
</script>

</body>
</html>
